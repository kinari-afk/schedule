<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪問看護ルート最適化アプリ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React, Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* スムーズなスクロールのためのカスタムCSS */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* モバイルでのタップ感向上 */
    button, select, input { touch-action: manipulation; }
    
    /* デザイン装飾 */
    .glass-effect { backdrop-filter: blur(8px); background-color: rgba(255, 255, 255, 0.8); }
    .timeline-shadow { box-shadow: inset -10px 0 10px -10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, Users, Map as MapIcon, Clock, MapPin, RefreshCw, Plus, Trash2, ArrowRight, CheckCircle2, UserPlus, Activity, Upload, AlertTriangle, CalendarDays, Link as LinkIcon, UserCog, Columns, Settings2, ChevronUp, ChevronDown, ArrowUpDown, ChevronRight } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const myFirebaseConfig = {
      apiKey: "AIzaSyBQFSkTTh582w-WwlfU6mwejs8rPAGrm8M",
      authDomain: "care-route-app.firebaseapp.com",
      projectId: "care-route-app",
      storageBucket: "care-route-app.firebasestorage.app",
      messagingSenderId: "1086680205439",
      appId: "1:1086680205439:web:d0a6a39a25555b7ae3174a"
    };

    let app, auth, db, appId;
    try {
      const envFirebaseConfig = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
      if (envFirebaseConfig) {
        const firebaseConfig = typeof envFirebaseConfig === 'string' ? JSON.parse(envFirebaseConfig) : envFirebaseConfig;
        app = initializeApp(firebaseConfig);
        appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
      } else {
        app = initializeApp(myFirebaseConfig);
        appId = myFirebaseConfig.projectId;
      }
      if (app) {
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (e) { console.error("Firebase init error", e); }

    const START_HOUR = 7;
    const END_HOUR = 19;
    const PIXELS_PER_MINUTE = 1.5;
    const getTop = (minutes) => (minutes - START_HOUR * 60) * PIXELS_PER_MINUTE;

    const parseTime = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    };

    const formatTime = (minutes) => {
      if (isNaN(minutes)) return "00:00";
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };

    const normalizeName = (name) => name?.replace(/[\s　]/g, '').replace(/様$/, '') || "";
    const getHashLoc = (str) => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
      return { x: Math.abs(hash % 80) + 10, y: Math.abs((hash >> 3) % 80) + 10 };
    };

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];
    const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6'];

    const DEFAULT_USER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=0&single=true&output=csv";
    const DEFAULT_NURSE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=1876217961&single=true&output=csv";

    function App() {
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [activeTab, setActiveTab] = useState('overview');
      const [selectedDay, setSelectedDay] = useState(new Date().getDay() || 1);
      const [nurses, setNurses] = useState([]);
      const [visits, setVisits] = useState([]);
      const [baseTravelTime, setBaseTravelTime] = useState(10);
      const [selectedNurseId, setSelectedNurseId] = useState(null);
      const [isOptimizing, setIsOptimizing] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState("");
      const [visitSortConfig, setVisitSortConfig] = useState({ key: 'startTime', direction: 'asc' });

      // Config states
      const [sheetUrl, setSheetUrl] = useState(DEFAULT_USER_SHEET_URL);
      const [nurseSheetUrl, setNurseSheetUrl] = useState(DEFAULT_NURSE_SHEET_URL);
      const [isLoadingSheet, setIsLoadingSheet] = useState(false);
      const [isLoadingNurseSheet, setIsLoadingNurseSheet] = useState(false);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            const initialToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : null;
            if (initialToken) { await signInWithCustomToken(auth, initialToken); } 
            else { await signInAnonymously(auth); }
          } catch (e) { console.error("Auth error", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        setIsSyncing(true);
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.nurses) setNurses(JSON.parse(data.nurses));
            if (data.visits) setVisits(JSON.parse(data.visits));
            if (data.sheetUrl) setSheetUrl(data.sheetUrl);
            if (data.nurseSheetUrl) setNurseSheetUrl(data.nurseSheetUrl);
            if (data.baseTravelTime !== undefined) setBaseTravelTime(data.baseTravelTime);
          } else {
            setDoc(docRef, { nurses: "[]", visits: "[]", sheetUrl: DEFAULT_USER_SHEET_URL, nurseSheetUrl: DEFAULT_NURSE_SHEET_URL, baseTravelTime: 10 });
          }
          setIsSyncing(false);
        }, (err) => { console.error(err); setIsSyncing(false); });
        return () => unsubscribe();
      }, [user]);

      const updateCloudData = (newData) => {
        if (user && db) {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
          setDoc(docRef, newData, { merge: true }).catch(e => console.error(e));
        }
      };

      const handleSetVisits = (newVal) => {
        setVisits(prev => {
          const next = typeof newVal === 'function' ? newVal(prev) : newVal;
          updateCloudData({ visits: JSON.stringify(next) });
          return next;
        });
      };

      const handleSetNurses = (newVal) => {
        setNurses(prev => {
          const next = typeof newVal === 'function' ? newVal(prev) : newVal;
          updateCloudData({ nurses: JSON.stringify(next) });
          return next;
        });
      };

      const handleSetBaseTravelTime = (v) => { setBaseTravelTime(v); updateCloudData({ baseTravelTime: v }); };
      const handleSheetUrlChange = (e) => { setSheetUrl(e.target.value); updateCloudData({ sheetUrl: e.target.value }); };
      const handleNurseSheetUrlChange = (e) => { setNurseSheetUrl(e.target.value); updateCloudData({ nurseSheetUrl: e.target.value }); };

      const selectedNurse = useMemo(() => nurses.find(n => n.id === selectedNurseId) || nurses[0], [nurses, selectedNurseId]);
      const isSelectedNurseOff = selectedNurse ? (selectedNurse.offDays || []).includes(selectedDay) : false;

      const unassignedCount = visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).length;

      const allSchedules = useMemo(() => {
        const schedules = {};
        nurses.forEach(nurse => {
          const isOff = (nurse.offDays || []).includes(selectedDay);
          if (isOff) { schedules[nurse.id] = { isOff: true, visits: [] }; return; }
          const assigned = visits.filter(v => v.nurseId === nurse.id && v.dayOfWeek === selectedDay);
          const sorted = [...assigned].sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
          let currentTime = parseTime(nurse.startTime);
          let calcVisits = [];
          let currentLoc = nurse.startLocation;
          sorted.forEach((visit) => {
            const dist = Math.sqrt(Math.pow(visit.location.x - currentLoc.x, 2) + Math.pow(visit.location.y - currentLoc.y, 2));
            const travelTime = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
            const arrivalTime = currentTime + travelTime;
            const actualStart = Math.max(arrivalTime, parseTime(visit.startTime));
            calcVisits.push({ ...visit, travelTime, isLate: arrivalTime > parseTime(visit.startTime), waitTime: actualStart - arrivalTime, arrivalTime: formatTime(arrivalTime), actualStartTime: formatTime(actualStart), departureTime: formatTime(actualStart + visit.duration) });
            currentTime = actualStart + visit.duration; currentLoc = visit.location;
          });
          let finalTravelTime = 0, returnTime = null;
          if (calcVisits.length > 0) {
            finalTravelTime = baseTravelTime + Math.round(Math.sqrt(Math.pow(currentLoc.x - nurse.startLocation.x, 2) + Math.pow(currentLoc.y - nurse.startLocation.y, 2)) * 0.05);
            returnTime = formatTime(currentTime + finalTravelTime);
          }
          schedules[nurse.id] = { isOff: false, visits: calcVisits, returnTime, finalTravelTime };
        });
        return schedules;
      }, [nurses, visits, selectedDay, baseTravelTime]);

      const stats = useMemo(() => {
        const sch = selectedNurse ? allSchedules[selectedNurse.id]?.visits || [] : [];
        let tt = 0, tv = 0, lc = 0;
        sch.forEach(s => { tt += s.travelTime; tv += s.duration; if (s.isLate) lc++; });
        if (sch.length > 0 && selectedNurse) { tt += allSchedules[selectedNurse.id]?.finalTravelTime || 0; }
        return { totalTravel: tt, totalVisit: tv, count: sch.length, lateCount: lc };
      }, [allSchedules, selectedNurse]);

      const handleAutoAssign = () => {
        const available = nurses.filter(n => !(n.offDays || []).includes(selectedDay));
        if (available.length === 0) { setToastMessage("出勤者がいません"); setShowToast(true); setTimeout(() => setShowToast(false), 3000); return; }
        setIsOptimizing(true);
        setTimeout(() => {
          const newVisits = [...visits];
          const todayUnassigned = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).sort((a,b) => parseTime(a.startTime) - parseTime(b.startTime));
          const states = available.map(n => {
            const mine = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === n.id).sort((a,b) => parseTime(a.startTime) - parseTime(b.startTime));
            const last = mine.pop();
            return { id: n.id, time: last ? parseTime(last.departureTime) : parseTime(n.startTime), loc: last ? last.location : n.startLocation };
          });
          todayUnassigned.forEach(visit => {
            let best = null, min = Infinity;
            states.forEach(s => {
              const dist = Math.sqrt(Math.pow(visit.location.x - s.loc.x, 2) + Math.pow(visit.location.y - s.loc.y, 2));
              const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
              if (s.time + travel <= parseTime(visit.startTime) && travel < min) { min = travel; best = s; }
            });
            if (!best) {
               let earliest = Infinity;
               states.forEach(s => {
                 const dist = Math.sqrt(Math.pow(visit.location.x - s.loc.x, 2) + Math.pow(visit.location.y - s.loc.y, 2));
                 const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                 if (s.time + travel < earliest) { earliest = s.time + travel; best = s; }
               });
            }
            if (best) {
              const vIdx = newVisits.findIndex(v => v.id === visit.id);
              newVisits[vIdx].nurseId = best.id;
              const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(Math.sqrt(Math.pow(visit.location.x - best.loc.x, 2) + Math.pow(visit.location.y - best.loc.y, 2)) * 0.05));
              best.time = Math.max(best.time + travel, parseTime(visit.startTime)) + visit.duration;
              best.loc = visit.location;
            }
          });
          handleSetVisits(newVisits); setIsOptimizing(false); setToastMessage("自動編成完了"); setShowToast(true); setTimeout(() => setShowToast(false), 3000);
        }, 800);
      };

      const handleDrop = (e, targetNurseId) => {
        e.preventDefault();
        const visitId = parseInt(e.dataTransfer.getData('text/plain'), 10);
        if (isNaN(visitId)) return;
        const offsetY = parseFloat(e.dataTransfer.getData('offsetY') || 0);
        const rect = e.currentTarget.getBoundingClientRect();
        const y = (e.clientY - rect.top) - offsetY;
        const minutes = y / PIXELS_PER_MINUTE + START_HOUR * 60;
        const snappedMinutes = Math.round(minutes / 5) * 5; 
        const newStartTime = formatTime(Math.max(START_HOUR * 60, Math.min(END_HOUR * 60 - 5, snappedMinutes)));
        handleSetVisits(prev => prev.map(v => v.id === visitId ? { ...v, nurseId: targetNurseId, startTime: newStartTime, originalStartTime: v.originalStartTime || v.startTime } : v));
      };

      const updateVisitNurse = (visitId, newNurseId) => {
        const parsedNurseId = newNurseId === 'unassigned' ? null : parseInt(newNurseId);
        handleSetVisits(visits.map(v => v.id === visitId ? { ...v, nurseId: parsedNurseId } : v));
      };

      const handleFetchSheet = async () => {
        setIsLoadingSheet(true);
        try {
          const res = await fetch(sheetUrl);
          const txt = await res.text();
          const rows = txt.split(/\r\n|\n/);
          const map = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          const result = [];
          for (let i = 1; i < rows.length; i++) {
            const p = rows[i].split(',');
            if (p[0]?.trim()) {
              let st = p[2]?.trim() || '09:00'; if (st.length === 4) st = '0' + st;
              result.push({ id: Date.now() + i, userName: p[0].includes('様') ? p[0] : p[0] + ' 様', location: getHashLoc(p[0]), duration: parseInt(p[3]) || 30, dayOfWeek: map[p[1]?.trim()] ?? 1, startTime: st, originalStartTime: st, nurseId: null });
            }
          }
          const merged = result.map(nv => {
            const ex = visits.find(v => normalizeName(v.userName) === normalizeName(nv.userName) && v.dayOfWeek === nv.dayOfWeek && v.originalStartTime === nv.originalStartTime);
            return ex ? { ...nv, id: ex.id, nurseId: ex.nurseId, startTime: ex.startTime, customTravelTime: ex.customTravelTime } : nv;
          });
          handleSetVisits(merged); setToastMessage("利用者同期成功"); setShowToast(true); setTimeout(() => setShowToast(false), 3000);
        } catch (e) { setToastMessage("同期失敗"); setShowToast(true); setTimeout(() => setShowToast(false), 3000); } finally { setIsLoadingSheet(false); }
      };

      const handleFetchNurseSheet = async () => {
        setIsLoadingNurseSheet(true);
        try {
          const res = await fetch(nurseSheetUrl);
          const txt = await res.text();
          const rows = txt.split(/\r\n|\n/);
          const map = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          const result = [];
          for (let i = 1; i < rows.length; i++) {
            const p = rows[i].split(',');
            if (p[0]?.trim()) {
              let st = p[1]?.trim() || '08:30'; if (st.length === 4) st = '0' + st;
              let off = []; Object.keys(map).forEach(d => { if (p[2]?.includes(d)) off.push(map[d]); });
              result.push({ id: Date.now() + i, name: p[0].trim(), startLocation: { x: 50, y: 50 }, color: colors[result.length % colors.length], startTime: st, offDays: off, isLowPriority: p[3]?.includes('低') });
            }
          }
          handleSetNurses(result); setToastMessage("看護師同期成功"); setShowToast(true); setTimeout(() => setShowToast(false), 3000);
        } catch (e) { setToastMessage("同期失敗"); setShowToast(true); setTimeout(() => setShowToast(false), 3000); } finally { setIsLoadingNurseSheet(false); }
      };

      const requestVisitSort = (key) => {
        setVisitSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc' }));
      };

      const sortedVisits = useMemo(() => {
        let filtered = visits.filter(v => v.dayOfWeek === selectedDay);
        if (visitSortConfig.key) {
          filtered.sort((a, b) => {
            let valA, valB;
            if (visitSortConfig.key === 'startTime') { valA = parseTime(a.startTime); valB = parseTime(b.startTime); }
            else if (visitSortConfig.key === 'nurseName') {
              const nA = nurses.find(n => n.id === a.nurseId); const nB = nurses.find(n => n.id === b.nurseId);
              valA = nA ? nA.name : '未指定'; valB = nB ? nB.name : '未指定';
            } else { valA = a[visitSortConfig.key]; valB = b[visitSortConfig.key]; }
            if (valA < valB) return visitSortConfig.direction === 'asc' ? -1 : 1;
            if (valA > valB) return visitSortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return filtered;
      }, [visits, selectedDay, visitSortConfig, nurses]);

      return (
        <div className="flex flex-col md:flex-row h-screen bg-[#F8FAFC] text-slate-800 font-sans overflow-hidden">
          {/* PCサイドバー */}
          <aside className="w-72 bg-slate-900 text-slate-300 hidden md:flex flex-col shrink-0 border-r border-slate-800">
            <div className="p-8">
              <div className="flex items-center gap-3 text-white font-black text-2xl mb-2">
                <div className="bg-teal-500 p-2 rounded-xl shadow-lg shadow-teal-500/20">
                  <Activity className="text-white" size={24} />
                </div>
                <span>CareRoute</span>
              </div>
              <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest pl-1">Route Optimization v2.5</p>
            </div>
            
            <nav className="flex-1 px-4 space-y-1.5 mt-2">
              <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all group ${activeTab === 'overview' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`}>
                <div className="flex items-center gap-4"><Columns size={22} /><span className="font-bold">全体スケジュール</span></div>
                <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'overview' ? 'opacity-100' : ''}`} />
              </button>
              <button onClick={() => setActiveTab('schedule')} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all group ${activeTab === 'schedule' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`}>
                <div className="flex items-center gap-4"><Calendar size={22} /><span className="font-bold">個別ルート確認</span></div>
                <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'schedule' ? 'opacity-100' : ''}`} />
              </button>
              <button onClick={() => setActiveTab('visits')} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all group ${activeTab === 'visits' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`}>
                <div className="flex items-center gap-4"><Users size={22} /><span className="font-bold">利用者管理</span></div>
                <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'visits' ? 'opacity-100' : ''}`} />
              </button>
              <button onClick={() => setActiveTab('nurses')} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all group ${activeTab === 'nurses' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`}>
                <div className="flex items-center gap-4"><UserCog size={22} /><span className="font-bold">看護師管理</span></div>
                <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'nurses' ? 'opacity-100' : ''}`} />
              </button>
            </nav>

            <div className="p-6 bg-slate-800/40 m-4 rounded-3xl border border-slate-700/50">
              <div className="flex items-center gap-3 text-xs text-emerald-400 font-black mb-1">
                {db && user ? (
                  <>
                    <div className="relative">
                      <div className="w-2.5 h-2.5 rounded-full bg-emerald-400"></div>
                      <div className="absolute inset-0 w-2.5 h-2.5 rounded-full bg-emerald-400 animate-ping"></div>
                    </div>
                    <span>SYNC ACTIVE</span>
                  </>
                ) : (
                  <>
                    <div className="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
                    <span>CONNECTING...</span>
                  </>
                )}
              </div>
              <p className="text-[9px] text-slate-500 font-bold leading-tight">チーム全員にリアルタイムで反映中</p>
            </div>
          </aside>

          {/* モバイルヘッダー */}
          <header className="md:hidden bg-slate-900 text-white px-4 py-3 flex justify-between items-center shrink-0 sticky top-0 z-50 shadow-lg shadow-slate-900/20">
            <div className="flex items-center gap-2 font-black text-lg">
               <Activity className="text-teal-400" size={20} />
               <span>CareRoute</span>
            </div>
            <div className="flex gap-0.5">
              <button onClick={() => setActiveTab('overview')} className={`p-2 rounded-xl ${activeTab === 'overview' ? 'bg-teal-600 text-white' : 'text-slate-400'}`}><Columns size={20} /></button>
              <button onClick={() => setActiveTab('schedule')} className={`p-2 rounded-xl ${activeTab === 'schedule' ? 'bg-teal-600 text-white' : 'text-slate-400'}`}><Calendar size={20} /></button>
              <button onClick={() => setActiveTab('visits')} className={`p-2 rounded-xl ${activeTab === 'visits' ? 'bg-teal-600 text-white' : 'text-slate-400'}`}><Users size={20} /></button>
              <button onClick={() => setActiveTab('nurses')} className={`p-2 rounded-xl ${activeTab === 'nurses' ? 'bg-teal-600 text-white' : 'text-slate-400'}`}><UserCog size={20} /></button>
            </div>

                      </div>
                    </div>
                    
                    <div className="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                      {nurses.map(n => (
                        <div key={n.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-lg shadow-slate-200/30 flex flex-col items-center text-center transition-all hover:translate-y-[-4px] hover:shadow-xl group">
                          <div className="w-20 h-20 rounded-[2rem] shadow-xl border-4 border-white mb-6 transition-transform group-hover:scale-110" style={{ backgroundColor: n.color }}></div>
                          <p className="font-black text-slate-800 text-xl mb-1">{n.name}</p>
                          <div className="flex gap-2 mb-4">
                             <span className="text-[9px] font-black bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full border border-slate-200 uppercase tracking-tighter">{n.startTime} START</span>
                             <span className={`text-[9px] font-black px-2.5 py-1 rounded-full border uppercase tracking-tighter ${n.offDays?.length > 0 ? 'bg-red-50 text-red-500 border-red-100' : 'bg-emerald-50 text-emerald-500 border-emerald-100'}`}>{n.offDays?.length > 0 ? 'HAS OFF' : 'FULL TIME'}</span>
                          </div>
                          <div className="w-full pt-4 border-t border-slate-50">
                             <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Off Days</p>
                             <p className="text-xs font-black text-slate-600">{n.offDays?.length > 0 ? n.offDays.map(d => DAYS[d]).join('・') : 'なし'}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* 通知トースト */}
          {showToast && <div className="fixed bottom-10 right-10 glass-effect text-slate-900 px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-4 animate-bounce z-[100] border border-white shadow-teal-500/20 min-w-[300px]"><div className="bg-emerald-500 p-2 rounded-xl text-white shadow-lg shadow-emerald-200"><CheckCircle2 size={24} /></div><span className="font-black text-sm tracking-tight">{toastMessage}</span></div>}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
