<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪問看護ルート最適化アプリ</title>
  
  <!-- Tailwind CSS (デザインを整えるためのツール) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React, アイコンをブラウザ上で直接読み込むための設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <!-- JSXコードをブラウザで実行できるようにするツール -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- アプリが表示される場所 -->
  <div id="root"></div>

  <!-- アプリのプログラム本体 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, Users, Map as MapIcon, Clock, MapPin, RefreshCw, Plus, Trash2, ArrowRight, CheckCircle2, UserPlus, Activity, Upload, AlertTriangle, CalendarDays, Link as LinkIcon, UserCog, Columns, Settings2 } from 'lucide-react';
    
    // --- Firebase の機能 (URLから直接読み込み) ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- Firebase の初期化設定 ---
    const myFirebaseConfig = {
      apiKey: "AIzaSyBQFSkTTh582w-WwlfU6mwejs8rPAGrm8M",
      authDomain: "care-route-app.firebaseapp.com",
      projectId: "care-route-app",
      storageBucket: "care-route-app.firebasestorage.app",
      messagingSenderId: "1086680205439",
      appId: "1:1086680205439:web:d0a6a39a25555b7ae3174a"
    };

    let app, auth, db, appId;
    try {
      // 1. Canvas環境かどうかの判定
      const envFirebaseConfig = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : (typeof __firebase_config !== 'undefined' ? __firebase_config : null);
      
      if (envFirebaseConfig) {
        const firebaseConfig = typeof envFirebaseConfig === 'string' ? JSON.parse(envFirebaseConfig) : envFirebaseConfig;
        app = initializeApp(firebaseConfig);
        appId = typeof window.__app_id !== 'undefined' ? window.__app_id : (typeof __app_id !== 'undefined' ? __app_id : 'default-app-id');
      } 
      // 2. 独自環境（GitHub Pages等）での動作
      else {
        app = initializeApp(myFirebaseConfig);
        appId = myFirebaseConfig.projectId;
      }
      
      if (app) {
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (e) {
      console.error("Firebase init error", e);
    }

    // --- タイムライン用の定数 ---
    const START_HOUR = 7;
    const END_HOUR = 19;
    const PIXELS_PER_MINUTE = 1.5;
    const getTop = (minutes) => (minutes - START_HOUR * 60) * PIXELS_PER_MINUTE;

    // --- ユーティリティ関数 ---
    const parseTime = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    };

    const formatTime = (minutes) => {
      if (isNaN(minutes)) return "00:00";
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };

    const normalizeName = (name) => {
      if (!name) return "";
      return name.replace(/[\s　]/g, '').replace(/様$/, '');
    };

    const getHashLoc = (str) => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return { 
        x: Math.abs(hash % 80) + 10, 
        y: Math.abs((hash >> 3) % 80) + 10 
      };
    };

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];
    const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6'];

    const DEFAULT_USER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=0&single=true&output=csv";
    const DEFAULT_NURSE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=1876217961&single=true&output=csv";

    function App() {
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            const initialToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : (typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null);
            if (initialToken) {
              await signInWithCustomToken(auth, initialToken);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth error", e);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      const [activeTab, setActiveTab] = useState('overview');
      const [selectedDay, setSelectedDay] = useState(1);
      
      const [nurses, setNurses] = useState([]);
      const [visits, setVisits] = useState([]);
      const [baseTravelTime, setBaseTravelTime] = useState(10);
      
      const [selectedNurseId, setSelectedNurseId] = useState(null);
      const [isOptimizing, setIsOptimizing] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState("");
      
      const [sheetUrl, setSheetUrl] = useState(DEFAULT_USER_SHEET_URL);
      const [isLoadingSheet, setIsLoadingSheet] = useState(false);
      const [showUserSheetConfig, setShowUserSheetConfig] = useState(false);

      const [nurseSheetUrl, setNurseSheetUrl] = useState(DEFAULT_NURSE_SHEET_URL);
      const [isLoadingNurseSheet, setIsLoadingNurseSheet] = useState(false);
      const [showNurseSheetConfig, setShowNurseSheetConfig] = useState(false);

      // --- クラウドとの同期 ---
      useEffect(() => {
        if (!user || !db) return;
        setIsSyncing(true);
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.nurses) setNurses(JSON.parse(data.nurses));
            if (data.visits) setVisits(JSON.parse(data.visits));
            if (data.sheetUrl !== undefined) setSheetUrl(data.sheetUrl);
            if (data.nurseSheetUrl !== undefined) setNurseSheetUrl(data.nurseSheetUrl);
            if (data.baseTravelTime !== undefined) setBaseTravelTime(data.baseTravelTime);
          } else {
            setDoc(docRef, {
              nurses: JSON.stringify([]),
              visits: JSON.stringify([]),
              sheetUrl: DEFAULT_USER_SHEET_URL,
              nurseSheetUrl: DEFAULT_NURSE_SHEET_URL,
              baseTravelTime: 10
            }).catch(e => console.error("Initial doc creation error:", e));
          }
          setIsSyncing(false);
        }, (error) => {
          console.error("Snapshot error:", error);
          setIsSyncing(false);
        });
        
        return () => unsubscribe();
      }, [user]);

      const updateCloudData = (newData) => {
        if (user && db) {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
          setDoc(docRef, newData, { merge: true }).catch(e => console.error("Cloud save error:", e));
        }
      };

      const handleSetNurses = (newNursesFn) => {
        setNurses(prev => {
           const next = typeof newNursesFn === 'function' ? newNursesFn(prev) : newNursesFn;
           updateCloudData({ nurses: JSON.stringify(next) });
           return next;
        });
      };

      const handleSetVisits = (newVisitsFn) => {
        setVisits(prev => {
           const next = typeof newVisitsFn === 'function' ? newVisitsFn(prev) : newVisitsFn;
           updateCloudData({ visits: JSON.stringify(next) });
           return next;
        });
      };

      const handleSetBaseTravelTime = (val) => {
        setBaseTravelTime(val);
        updateCloudData({ baseTravelTime: val });
      };

      const handleSheetUrlChange = (e) => {
        const url = e.target.value;
        setSheetUrl(url);
        updateCloudData({ sheetUrl: url });
      };

      const handleNurseSheetUrlChange = (e) => {
        const url = e.target.value;
        setNurseSheetUrl(url);
        updateCloudData({ nurseSheetUrl: url });
      };

      const selectedNurse = useMemo(() => nurses.find(n => n.id === selectedNurseId) || nurses[0], [nurses, selectedNurseId]);
      const isSelectedNurseOff = selectedNurse ? (selectedNurse.offDays || []).includes(selectedDay) : false;

      const updateCustomTravelTime = (visitId, newTime) => {
        handleSetVisits(prevVisits => prevVisits.map(v => {
          if (v.id === visitId) {
            return { ...v, customTravelTime: newTime };
          }
          return v;
        }));
      };

      const handleDrop = (e, targetNurseId) => {
        e.preventDefault();
        const visitId = parseInt(e.dataTransfer.getData('text/plain'), 10);
        if (isNaN(visitId)) return;
        const offsetY = parseFloat(e.dataTransfer.getData('offsetY') || 0);
        const rect = e.currentTarget.getBoundingClientRect();
        const y = (e.clientY - rect.top) - offsetY;
        const minutes = y / PIXELS_PER_MINUTE + START_HOUR * 60;
        const snappedMinutes = Math.round(minutes / 5) * 5; 
        const finalMinutes = Math.max(START_HOUR * 60, Math.min(END_HOUR * 60 - 5, snappedMinutes));
        const newStartTime = formatTime(finalMinutes);
        
        handleSetVisits(prevVisits => prevVisits.map(v => {
          if (v.id === visitId) {
             const original = v.originalStartTime || v.startTime;
             return { ...v, nurseId: targetNurseId, startTime: newStartTime, originalStartTime: original };
          }
          return v;
        }));
      };

      const allSchedules = useMemo(() => {
        const schedulesByNurse = {};
        nurses.forEach(nurse => {
          const isOff = (nurse.offDays || []).includes(selectedDay);
          if (isOff) {
            schedulesByNurse[nurse.id] = { isOff: true, visits: [] };
            return;
          }
          const assignedVisits = visits.filter(v => v.nurseId === nurse.id && v.dayOfWeek === selectedDay);
          const sortedVisits = [...assignedVisits].sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
          let currentTime = parseTime(nurse.startTime);
          let calcVisits = [];
          let currentLoc = nurse.startLocation;
          sortedVisits.forEach((visit) => {
            const dist = Math.sqrt(Math.pow(visit.location.x - currentLoc.x, 2) + Math.pow(visit.location.y - currentLoc.y, 2));
            const calculatedTravelTime = baseTravelTime + Math.round(dist * 0.05);
            const travelTime = visit.customTravelTime !== undefined && visit.customTravelTime !== null ? visit.customTravelTime : calculatedTravelTime;
            const targetStart = parseTime(visit.startTime);
            const arrivalTime = currentTime + travelTime;
            const isLate = arrivalTime > targetStart;
            const actualStart = Math.max(arrivalTime, targetStart);
            const waitTime = actualStart > arrivalTime ? actualStart - arrivalTime : 0;
            const departureTime = actualStart + visit.duration;
            calcVisits.push({
              ...visit, travelTime, waitTime, isLate,
              arrivalTime: formatTime(arrivalTime),
              actualStartTime: formatTime(actualStart),
              departureTime: formatTime(departureTime)
            });
            currentTime = departureTime;
            currentLoc = visit.location;
          });
          let returnTime = null;
          let finalTravelTime = 0;
          if (calcVisits.length > 0) {
            const finalDist = Math.sqrt(Math.pow(currentLoc.x - nurse.startLocation.x, 2) + Math.pow(currentLoc.y - nurse.startLocation.y, 2));
            finalTravelTime = baseTravelTime + Math.round(finalDist * 0.05);
            returnTime = formatTime(currentTime + finalTravelTime);
          }
          schedulesByNurse[nurse.id] = { isOff: false, visits: calcVisits, returnTime, finalTravelTime };
        });
        return schedulesByNurse;
      }, [nurses, visits, selectedDay, baseTravelTime]);

      const schedule = selectedNurse ? allSchedules[selectedNurse.id]?.visits || [] : [];
      const stats = useMemo(() => {
        let totalTravel = 0, totalVisit = 0, lateCount = 0;
        schedule.forEach(s => {
          totalTravel += s.travelTime; totalVisit += s.duration;
          if (s.isLate) lateCount++;
        });
        if (schedule.length > 0 && selectedNurse) {
          totalTravel += allSchedules[selectedNurse.id]?.finalTravelTime || 0;
        }
        return { totalTravel, totalVisit, count: schedule.length, lateCount };
      }, [schedule, allSchedules, selectedNurse]);

      const handleAutoAssign = () => {
        const availableNurses = nurses.filter(n => !(n.offDays || []).includes(selectedDay));
        if (availableNurses.length === 0) {
          setToastMessage(`この曜日に出勤している看護師がいません。`);
          setShowToast(true); setTimeout(() => setShowToast(false), 3000);
          return;
        }
        setIsOptimizing(true);
        setTimeout(() => {
          const newVisits = [...visits];
          const unassignedToday = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null);
          unassignedToday.sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
          const nurseStates = availableNurses.map(n => {
            const myVisits = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === n.id);
            if (myVisits.length === 0) return { id: n.id, time: parseTime(n.startTime), loc: n.startLocation };
            const last = myVisits.sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime)).pop();
            return { id: n.id, time: parseTime(last.startTime) + last.duration, loc: last.location };
          });
          unassignedToday.forEach(visit => {
            const targetStart = parseTime(visit.startTime);
            let bestNurse = null, minTravel = Infinity;
            nurseStates.forEach(ns => {
              const nurseDef = availableNurses.find(n => n.id === ns.id);
              if (nurseDef && nurseDef.isLowPriority) return;
              const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
              const travel = baseTravelTime + Math.round(dist * 0.05);
              if (ns.time + travel <= targetStart && travel < minTravel) { minTravel = travel; bestNurse = ns; }
            });
            if (!bestNurse) {
              minTravel = Infinity;
              nurseStates.forEach(ns => {
                const nurseDef = availableNurses.find(n => n.id === ns.id);
                if (nurseDef && !nurseDef.isLowPriority) return;
                const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
                const travel = baseTravelTime + Math.round(dist * 0.05);
                if (ns.time + travel <= targetStart && travel < minTravel) { minTravel = travel; bestNurse = ns; }
              });
            }
            if (!bestNurse) {
              let earliest = Infinity, isBestNurseLowPriority = true;
              nurseStates.forEach(ns => {
                const nurseDef = availableNurses.find(n => n.id === ns.id);
                const isLow = nurseDef ? !!nurseDef.isLowPriority : false;
                const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
                const travel = baseTravelTime + Math.round(dist * 0.05);
                const arrival = ns.time + travel;
                if (arrival < earliest || (arrival === earliest && isBestNurseLowPriority && !isLow)) {
                  earliest = arrival; bestNurse = ns; isBestNurseLowPriority = isLow;
                }
              });
            }
            if (bestNurse) {
              const vIdx = newVisits.findIndex(v => v.id === visit.id);
              newVisits[vIdx].nurseId = bestNurse.id;
              const dist = Math.sqrt(Math.pow(visit.location.x - bestNurse.loc.x, 2) + Math.pow(visit.location.y - bestNurse.loc.y, 2));
              const travel = baseTravelTime + Math.round(dist * 0.05);
              bestNurse.time = Math.max(bestNurse.time + travel, targetStart) + visit.duration;
              bestNurse.loc = visit.location;
            }
          });
          handleSetVisits(newVisits);
          setIsOptimizing(false);
          setToastMessage(`${DAYS[selectedDay]}曜日の担当者を自動編成しました`);
          setShowToast(true); setTimeout(() => setShowToast(false), 3000);
        }, 800);
      };

      const handleFetchSheet = async () => {
        setIsLoadingSheet(true);
        try {
          const response = await fetch(sheetUrl);
          const text = await response.text();
          const lines = text.split(/\r\n|\n/);
          const imported = [];
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          for (let i = 1; i < lines.length; i++) {
            const parts = lines[i].split(',');
            if (parts.length > 0 && parts[0].trim()) {
              const name = parts[0].trim(), dayStr = parts[1]?.trim(), dayOfWeek = dayMap[dayStr] ?? 1;
              let start = parts[2]?.trim() || '09:00'; if (start.length === 4) start = '0' + start;
              imported.push({
                id: Date.now() + i, userName: name.includes('様') ? name : `${name} 様`,
                location: getHashLoc(name), duration: parseInt(parts[3]) || 30,
                dayOfWeek, startTime: start, originalStartTime: start, nurseId: null
              });
            }
          }
          const merged = imported.map(newV => {
            const existing = visits.find(v => normalizeName(v.userName) === normalizeName(newV.userName) && v.dayOfWeek === newV.dayOfWeek && v.originalStartTime === newV.originalStartTime);
            return existing ? { ...newV, id: existing.id, nurseId: existing.nurseId, startTime: existing.startTime, customTravelTime: existing.customTravelTime } : newV;
          });
          handleSetVisits(merged);
          setToastMessage(`スケジュールを同期しました`);
          setShowToast(true); setTimeout(() => setShowToast(false), 4000);
        } catch (e) { setToastMessage("読み込み失敗"); setShowToast(true); }
        finally { setIsLoadingSheet(false); }
      };

      const handleFetchNurseSheet = async () => {
        setIsLoadingNurseSheet(true);
        try {
          const response = await fetch(nurseSheetUrl);
          const text = await response.text();
          const lines = text.split(/\r\n|\n/);
          const imported = [];
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          for (let i = 1; i < lines.length; i++) {
            const parts = lines[i].split(',');
            if (parts.length > 0 && parts[0].trim()) {
              const name = parts[0].trim();
              let start = parts[1]?.trim() || '08:30'; if (start.length === 4) start = '0' + start;
              let offDays = [];
              Object.keys(dayMap).forEach(d => { if (parts[2]?.includes(d)) offDays.push(dayMap[d]); });
              imported.push({
                id: Date.now() + i, name, startLocation: { x: 50, y: 50 },
                color: colors[imported.length % colors.length], startTime: start,
                offDays, isLowPriority: parts[3]?.includes('低')
              });
            }
          }
          handleSetNurses(imported);
          setToastMessage(`看護師リストを読み込みました`);
          setShowToast(true); setTimeout(() => setShowToast(false), 4000);
        } catch (e) { setToastMessage("読み込み失敗"); setShowToast(true); }
        finally { setIsLoadingNurseSheet(false); }
      };

      // 定義漏れしていた変数を追加
      const unassignedCount = visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).length;

      return (
        <div className="flex h-screen bg-slate-50 text-slate-800 font-sans">
          <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex shrink-0">
            <div className="p-6">
              <div className="flex items-center gap-2 text-white font-bold text-xl mb-1">
                <Activity className="text-teal-400" />
                <span>CareRoute</span>
              </div>
              <p className="text-xs text-slate-500">定期訪問スケジュール同期版</p>
            </div>
            <nav className="flex-1 px-4 space-y-2">
              <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'overview' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Columns size={20} /> 全体スケジュール
              </button>
              <button onClick={() => setActiveTab('schedule')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'schedule' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Calendar size={20} /> 個別・ルート確認
              </button>
              <button onClick={() => setActiveTab('visits')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'visits' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Users size={20} /> 利用者管理
              </button>
              <button onClick={() => setActiveTab('nurses')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'nurses' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <UserCog size={20} /> 看護師管理
              </button>
            </nav>
            <div className="p-4 bg-slate-800 m-4 rounded-xl text-center">
              <div className="flex justify-center items-center gap-1.5 text-xs text-emerald-400 font-bold mb-1">
                {db && user ? (
                  <>
                    <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    クラウド同期中
                  </>
                ) : (
                  <>
                    <div className="w-2 h-2 rounded-full bg-slate-400"></div>
                    接続待機中...
                  </>
                )}
              </div>
              <p className="text-[10px] text-slate-400">データはチームで自動共有されます</p>
            </div>
          </aside>

          <main className="flex-1 flex flex-col overflow-hidden">
            <header className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shrink-0">
              <div className="flex items-center gap-2 font-bold"><Activity className="text-teal-400" size={20} />CareRoute</div>
              <div className="flex gap-4">
                <button onClick={() => setActiveTab('overview')} className={activeTab === 'overview' ? 'text-teal-400' : 'text-slate-400'}><Columns size={20} /></button>
                <button onClick={() => setActiveTab('schedule')} className={activeTab === 'schedule' ? 'text-teal-400' : 'text-slate-400'}><Calendar size={20} /></button>
                <button onClick={() => setActiveTab('visits')} className={activeTab === 'visits' ? 'text-teal-400' : 'text-slate-400'}><Users size={20} /></button>
                <button onClick={() => setActiveTab('nurses')} className={activeTab === 'nurses' ? 'text-teal-400' : 'text-slate-400'}><UserCog size={20} /></button>
              </div>
            </header>

            {activeTab !== 'nurses' && (
              <div className="bg-white border-b border-slate-200 p-4 shadow-sm z-10 flex items-center gap-4 overflow-x-auto shrink-0">
                <div className="flex items-center gap-2 text-slate-500 font-medium whitespace-nowrap">
                  <CalendarDays size={18} /> 対象曜日:
                </div>
                <div className="flex gap-2">
                  {DAYS.map((day, idx) => (
                    <button key={idx} onClick={() => setSelectedDay(idx)} className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-colors shrink-0 ${selectedDay === idx ? 'bg-teal-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{day}</button>
                  ))}
                </div>
              </div>
            )}

            <div className="flex-1 overflow-auto p-4 md:p-8">
              {activeTab === 'overview' && (
                <div className="flex flex-col h-full space-y-4">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 shrink-0">
                    <div className="flex flex-wrap items-center gap-4">
                      <h1 className="text-2xl font-bold text-slate-800">{DAYS[selectedDay]}曜日の全体スケジュール</h1>
                      <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                        <Clock size={14} className="text-slate-400" />
                        <span className="text-xs font-bold text-slate-600">基本移動:</span>
                        <input type="number" min="0" value={baseTravelTime} onChange={e => handleSetBaseTravelTime(Math.max(0, parseInt(e.target.value) || 0))} className="w-12 text-center bg-slate-50 border border-slate-200 rounded text-sm font-bold text-slate-800 outline-none focus:border-teal-500"/>
                        <span className="text-xs text-slate-500">分</span>
                      </div>
                    </div>
                    <button onClick={handleAutoAssign} disabled={isOptimizing || unassignedCount === 0 || nurses.length === 0} className="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors disabled:opacity-50 shadow-sm whitespace-nowrap">
                      <RefreshCw size={16} className={isOptimizing ? "animate-spin" : ""} /> 未割り当てを自動編成
                    </button>
                  </div>
                  {nurses.length === 0 ? (
                    <div className="flex-1 flex flex-col items-center justify-center text-slate-500 bg-white rounded-xl border border-slate-200 shadow-sm p-12">
                      <UserCog size={48} className="mb-4 opacity-20" />
                      <p className="text-lg font-medium text-slate-600 mb-2">看護師が登録されていません</p>
                    </div>
                  ) : (
                    <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm overflow-auto relative">
                      <div className="min-w-max">
                        <div className="flex sticky top-0 z-30 bg-slate-50 border-b border-slate-200 shadow-sm">
                          <div className="w-16 shrink-0 border-r border-slate-200 bg-slate-100 flex justify-center items-center text-xs font-bold text-slate-500 sticky left-0 z-40">時間</div>
                          <div className="w-56 shrink-0 border-r border-slate-200 flex flex-col items-center justify-center py-2 bg-white">
                             <div className="font-bold text-slate-700 text-sm">未割り当て</div>
                             <div className={`${unassignedCount > 0 ? 'bg-red-500 text-white' : 'bg-slate-200 text-slate-600'} text-xs font-bold px-2 py-0.5 rounded-full mt-1`}>{unassignedCount}件</div>
                          </div>
                          {nurses.map(nurse => {
                            const isOff = (nurse.offDays || []).includes(selectedDay);
                            const assignedVisits = allSchedules[nurse.id]?.visits || [];
                            return (
                              <div key={nurse.id} className={`shrink-0 border-r border-slate-200 flex flex-col items-center justify-center py-2 ${isOff ? 'w-12 bg-slate-100' : 'w-56 bg-white'}`} style={{ backgroundColor: isOff ? '#f8fafc' : nurse.color + '10' }}>
                                {isOff ? (
                                  <><div className="text-xs font-bold text-slate-400 mb-1 truncate" style={{ writingMode: 'vertical-rl' }}>{nurse.name.split(/[\s　]/)[0]}</div><div className="text-xs font-bold text-red-400">休</div></>
                                ) : (
                                  <><div className="font-bold text-slate-800 text-sm flex items-center gap-1"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: nurse.color }}></div>{nurse.name}</div><div className="text-xs font-bold text-slate-500 mt-1">{assignedVisits.length}件</div></>
                                )}
                              </div>
                            )
                          })}
                        </div>
                        <div className="flex relative" style={{ height: `${(END_HOUR - START_HOUR) * 60 * PIXELS_PER_MINUTE}px` }}>
                          <div className="w-16 shrink-0 border-r border-slate-200 bg-white sticky left-0 z-20">
                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                              <div key={i} className="absolute w-full text-right pr-2 text-xs font-medium text-slate-400" style={{ top: i * 60 * PIXELS_PER_MINUTE - 8 }}>{START_HOUR + i}:00</div>
                            ))}
                          </div>
                          <div className="absolute left-16 right-0 inset-y-0 pointer-events-none z-0">
                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                              <div key={i} className="absolute w-full border-t border-slate-200" style={{ top: i * 60 * PIXELS_PER_MINUTE }}></div>
                            ))}
                          </div>
                          <div className="w-56 shrink-0 border-r border-slate-200 relative z-10 bg-slate-50/30" onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, null)}>
                             {visits.filter(v => v.nurseId === null && v.dayOfWeek === selectedDay).map(v => {
                               const top = getTop(parseTime(v.startTime)), height = v.duration * PIXELS_PER_MINUTE;
                               return (
                                 <div key={v.id} draggable={true} onDragStart={(e) => { e.dataTransfer.setData('text/plain', v.id); const rect = e.currentTarget.getBoundingClientRect(); e.dataTransfer.setData('offsetY', e.clientY - rect.top); }} className="absolute left-2 right-2 bg-white border border-slate-300 border-l-4 border-l-slate-400 rounded shadow-sm p-1.5 overflow-hidden flex flex-col group hover:z-30 hover:shadow-md transition-shadow cursor-move" style={{ top: `${top}px`, height: `${Math.max(height, 24)}px` }}>
                                   <div className="font-bold text-slate-800 text-[11px] leading-tight truncate">{v.userName}</div>
                                   <div className="text-[10px] text-slate-500 font-medium mt-auto">
                                     {v.originalStartTime && v.originalStartTime !== v.startTime ? <span className="text-orange-600 font-bold">{v.originalStartTime} ➔ {v.startTime}</span> : <span>{v.startTime}</span>}
                                   </div>
                                 </div>
                               )
                             })}
                          </div>
                          {nurses.map(nurse => {
                            const isOff = (nurse.offDays || []).includes(selectedDay);
                            const scheduleData = allSchedules[nurse.id], assignedVisits = scheduleData?.visits || [];
                            return (
                              <div key={nurse.id} className={`shrink-0 border-r border-slate-200 relative z-10 ${isOff ? 'w-12 bg-slate-50/80' : 'w-56'}`} onDragOver={(e) => { if (!isOff) e.preventDefault(); }} onDrop={(e) => { if (!isOff) handleDrop(e, nurse.id); }}>
                                {isOff ? (
                                  <div className="absolute inset-0 flex items-center justify-center text-slate-300 pointer-events-none"><div className="sticky top-1/2 -translate-y-1/2 flex flex-col items-center"><CalendarDays size={16} className="mb-3 opacity-50" /><div className="text-sm font-bold tracking-widest opacity-60" style={{ writingMode: 'vertical-rl' }}>お休み</div></div></div>
                                ) : (
                                  <>
                                    {assignedVisits.map((item, idx) => {
                                      const top = getTop(parseTime(item.actualStartTime)), height = item.duration * PIXELS_PER_MINUTE;
                                      let prevDep = idx === 0 ? parseTime(nurse.startTime) : parseTime(assignedVisits[idx-1].departureTime);
                                      const arrival = parseTime(item.arrivalTime), travelHeight = (arrival - prevDep) * PIXELS_PER_MINUTE;
                                      return (
                                        <React.Fragment key={item.id}>
                                          {travelHeight > 0 && (
                                            <div className="absolute left-1/2 w-0 border-l-2 border-dashed border-slate-400 pointer-events-none" style={{ top: `${getTop(prevDep)}px`, height: `${travelHeight}px`, transform: 'translateX(-50%)' }}>
                                              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-slate-500 text-[10px] font-medium px-1 py-0.5 rounded-full border border-slate-200 shadow-sm z-20 flex items-center pointer-events-auto">
                                                <input type="number" min="0" value={item.customTravelTime ?? item.travelTime} onChange={(e) => updateCustomTravelTime(item.id, e.target.value === '' ? null : parseInt(e.target.value, 10))} className={`w-6 text-center bg-transparent outline-none ${item.customTravelTime ? 'text-teal-600 font-bold' : ''}`}/>分
                                              </div>
                                            </div>
                                          )}
                                          <div draggable={true} onDragStart={(e) => { e.dataTransfer.setData('text/plain', item.id); const rect = e.currentTarget.getBoundingClientRect(); e.dataTransfer.setData('offsetY', e.clientY - rect.top); }} className={`absolute left-2 right-2 bg-white border rounded shadow-sm p-1.5 overflow-hidden flex flex-col group hover:z-30 hover:shadow-md transition-shadow border-l-4 cursor-move ${item.isLate ? 'border-l-red-500 border-red-200 bg-red-50/80' : ''}`} style={{ top: `${top}px`, height: `${Math.max(height, 24)}px`, borderLeftColor: item.isLate ? '#ef4444' : nurse.color }}>
                                            <div className="font-bold text-slate-800 text-[11px] leading-tight truncate">{item.userName}</div>
                                            <div className="mt-auto flex flex-col justify-end text-[10px] text-slate-500">
                                              {item.originalStartTime && item.originalStartTime !== item.startTime && <div className="text-orange-600 font-bold text-[9px] mb-0.5">元: {item.originalStartTime}</div>}
                                              <div className="flex justify-between w-full"><span className={item.originalStartTime !== item.startTime ? 'text-orange-600 font-bold' : ''}>指: {item.startTime}</span><span className={item.isLate ? 'text-red-600 font-bold' : ''}>着: {item.arrivalTime}</span></div>
                                            </div>
                                          </div>
                                        </React.Fragment>
                                      )
                                    })}
                                  </>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {activeTab === 'schedule' && (
                <div className="max-w-6xl mx-auto space-y-6">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h1 className="text-2xl font-bold text-slate-800">{DAYS[selectedDay]}曜日の個別・ルート確認</h1>
                    <div className="flex items-center gap-2 bg-white p-1 rounded-lg border border-slate-200 shadow-sm overflow-x-auto max-w-full">
                      {nurses.map(nurse => {
                        const isOff = (nurse.offDays || []).includes(selectedDay);
                        return (
                          <button key={nurse.id} onClick={() => setSelectedNurseId(nurse.id)}
                            className={`px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-1 whitespace-nowrap 
                              ${selectedNurseId === nurse.id ? 'bg-slate-100 text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}
                              ${isOff ? 'opacity-50 line-through' : ''}`}
                          >
                            {nurse.name} {isOff && '(休)'}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                      <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><Users size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">訪問件数</p><p className="text-2xl font-bold">{stats.count} 件</p></div>
                    </div>
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                      <div className="w-12 h-12 rounded-full bg-teal-50 flex items-center justify-center text-teal-600"><MapIcon size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">移動合計</p><p className="text-2xl font-bold">{stats.totalTravel} 分</p></div>
                    </div>
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                      <div className="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-600"><AlertTriangle size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">時間超過・遅刻</p><p className={`text-2xl font-bold ${stats.lateCount > 0 ? 'text-red-500' : 'text-slate-800'}`}>{stats.lateCount} 件</p></div>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                      <h2 className="text-lg font-bold flex items-center gap-2 mb-6"><Clock className="text-slate-400" /> スケジュール詳細</h2>
                      <div className="relative">
                        <div className="absolute left-[21px] top-4 bottom-4 w-0.5 bg-slate-200"></div>
                        <div className="space-y-6">
                          <div className="relative flex items-center gap-4 z-10">
                            <div className="w-11 h-11 rounded-full bg-slate-100 border-2 border-slate-300 flex items-center justify-center text-slate-600 shrink-0"><MapPin size={20} /></div>
                            <div><p className="font-bold text-slate-800">ステーション出発</p><p className="text-sm text-slate-500">勤務開始 {selectedNurse?.startTime}</p></div>
                          </div>
                          {schedule.map((item, idx) => (
                            <div key={item.id} className="relative z-10">
                              <div className={`ml-16 mb-2 flex items-center gap-2 text-xs font-medium py-1 px-3 rounded-full w-max border ${item.isLate ? 'bg-red-50 text-red-600 border-red-200' : 'bg-slate-50 text-slate-500 border-slate-100'}`}>
                                <ArrowRight size={12} /> 移動: <input type="number" min="0" value={item.customTravelTime ?? item.travelTime} onChange={(e) => updateCustomTravelTime(item.id, e.target.value === '' ? null : parseInt(e.target.value, 10))} className={`w-10 text-center bg-transparent border-b border-slate-300 outline-none ${item.customTravelTime ? 'text-teal-600 font-bold' : ''}`}/> 分 
                                {item.customTravelTime && <button onClick={() => updateCustomTravelTime(item.id, null)} className="text-[10px] text-slate-400 ml-1 underline">自動</button>}
                              </div>
                              <div className="flex gap-4 items-start">
                                <div className="w-11 h-11 rounded-full text-white flex items-center justify-center font-bold text-lg shrink-0 shadow-sm" style={{ backgroundColor: selectedNurse?.color }}>{idx + 1}</div>
                                <div className={`bg-white border-l-4 rounded-r-lg border-y border-r p-4 flex-1 shadow-sm ${item.isLate ? 'border-l-red-500 border-y-red-200 border-r-red-200 bg-red-50/30' : 'border-l-teal-500 border-y-slate-200 border-r-slate-200'}`}>
                                  <div className="flex justify-between items-start mb-2"><h4 className="font-bold text-slate-800 text-lg">{item.userName}</h4><span className="text-sm font-medium bg-slate-100 text-slate-600 px-2 py-1 rounded">{item.duration}分</span></div>
                                  <div className="flex items-center gap-2 text-sm"><span className="w-16 text-slate-500">指定時間:</span><span className="font-bold text-slate-800">{item.startTime}</span></div>
                                  <div className="flex items-center gap-2 text-sm"><span className="w-16 text-slate-500">到着予定:</span><span className={item.isLate ? 'text-red-600 font-bold' : 'text-slate-600'}>{item.arrivalTime}</span></div>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[600px] lg:h-auto">
                       <h2 className="text-lg font-bold flex items-center gap-2 mb-4"><MapIcon className="text-slate-400" /> ルートマップ</h2>
                       <div className="flex-1 bg-slate-50 rounded-lg border border-slate-200 overflow-hidden relative">
                         <svg viewBox="-10 -10 120 120" className="w-full h-full">
                           {visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).map(visit => (
                             <circle key={visit.id} cx={visit.location.x} cy={visit.location.y} r="2.5" fill="#cbd5e1" className="animate-pulse"/>
                           ))}
                           {!isSelectedNurseOff && selectedNurse && schedule.map((visit, i) => {
                             const prev = i === 0 ? selectedNurse.startLocation : schedule[i-1].location;
                             return <line key={visit.id} x1={prev.x} y1={prev.y} x2={visit.location.x} y2={visit.location.y} stroke={visit.isLate ? '#ef4444' : selectedNurse.color} strokeWidth="1.2" strokeDasharray="2 2" />
                           })}
                           {!isSelectedNurseOff && selectedNurse && schedule.map((visit, i) => (
                             <g key={visit.id}><circle cx={visit.location.x} cy={visit.location.y} r="3.5" fill={visit.isLate ? '#fee2e2' : '#fff'} stroke={visit.isLate ? '#ef4444' : selectedNurse.color} strokeWidth="1.5" /><text x={visit.location.x} y={visit.location.y - 5} fontSize="3.5" fontWeight="bold" textAnchor="middle" fill="#334155">{visit.userName}</text></g>
                           ))}
                         </svg>
                       </div>
                    </div>
                  </div>
                </div>
              )}
              {activeTab === 'visits' && (
                <div className="max-w-6xl mx-auto space-y-6">
                  <h1 className="text-2xl font-bold text-slate-800">利用者スケジュールの管理</h1>
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800"><RefreshCw size={20} className="text-blue-600"/> 同期設定</h2>
                      <button onClick={handleFetchSheet} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">最新データを再読み込み</button>
                    </div>
                    <div className="border border-slate-200 rounded-lg overflow-hidden">
                      <button type="button" onClick={() => setShowUserSheetConfig(!showUserSheetConfig)} className="w-full bg-slate-50 p-3 flex justify-between items-center text-sm font-medium text-slate-700 hover:bg-slate-100"><span>URL設定</span><span className="text-xs text-slate-400">変更</span></button>
                      {showUserSheetConfig && <div className="p-4 bg-white border-t border-slate-200"><input type="text" value={sheetUrl} onChange={handleSheetUrlChange} className="w-full border border-slate-300 rounded p-2 text-sm"/></div>}
                    </div>
                  </div>
                </div>
              )}
              {activeTab === 'nurses' && (
                <div className="max-w-6xl mx-auto space-y-6">
                  <h1 className="text-2xl font-bold text-slate-800">看護師の管理</h1>
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800"><RefreshCw size={20} className="text-blue-600"/> 同期設定</h2>
                      <button onClick={handleFetchNurseSheet} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">名簿を再読み込み</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
          {showToast && <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-bounce z-50 border border-slate-700"><CheckCircle2 size={20} className="text-emerald-400" /><span>{toastMessage}</span></div>}
        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
