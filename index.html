<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>訪問看護ルート最適化アプリ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React, Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 画面回転時のテキストサイズ自動調整を防止 */
    html { -webkit-text-size-adjust: 100%; }
    
    /* スムーズなスクロール */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* モバイルでのタップ感向上 */
    button, select, input { touch-action: manipulation; }
    
    /* モバイルでの入力時ズーム防止（フォントサイズ16px以上） */
    @media (max-width: 768px) {
      input, select, textarea { font-size: 16px !important; }
    }
    
    .glass-effect { backdrop-filter: blur(8px); background-color: rgba(255, 255, 255, 0.8); }
    .timeline-shadow { box-shadow: inset -10px 0 10px -10px rgba(0,0,0,0.1); }
    
    /* カード内のテキストが消えないよう最小高さを確保 */
    .visit-card { min-height: 48px; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, Users, Map as MapIcon, Clock, MapPin, RefreshCw, Plus, Trash2, ArrowRight, CheckCircle2, UserPlus, Activity, Upload, AlertTriangle, CalendarDays, Link as LinkIcon, UserCog, Columns, Settings2, ChevronUp, ChevronDown, ArrowUpDown, ChevronRight, ChevronLeft, ChevronsLeft, ChevronsRight, Undo, Lock, Unlock, Briefcase, X } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const myFirebaseConfig = {
      apiKey: "AIzaSyBQFSkTTh582w-WwlfU6mwejs8rPAGrm8M",
      authDomain: "care-route-app.firebaseapp.com",
      projectId: "care-route-app",
      storageBucket: "care-route-app.firebasestorage.app",
      messagingSenderId: "1086680205439",
      appId: "1:1086680205439:web:d0a6a39a25555b7ae3174a"
    };

    let app, auth, db, appId;
    try {
      const envFirebaseConfig = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
      if (envFirebaseConfig) {
        const firebaseConfig = typeof envFirebaseConfig === 'string' ? JSON.parse(envFirebaseConfig) : envFirebaseConfig;
        app = initializeApp(firebaseConfig);
        appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
      } else {
        app = initializeApp(myFirebaseConfig);
        appId = myFirebaseConfig.projectId;
      }
      if (app) {
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (e) { console.error("Firebase init error", e); }

    const START_HOUR = 7;
    const END_HOUR = 19;
    const PIXELS_PER_MINUTE = 2.0; 
    const getTop = (minutes) => (minutes - START_HOUR * 60) * PIXELS_PER_MINUTE;

    const parseTime = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    };

    const formatTime = (minutes) => {
      if (isNaN(minutes)) return "00:00";
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };

    const normalizeName = (name) => name?.replace(/[\s　]/g, '').replace(/様$/, '') || "";
    const getHashLoc = (str) => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
      return { x: Math.abs(hash % 80) + 10, y: Math.abs((hash >> 3) % 80) + 10 };
    };

    const DISPLAY_DAYS = ['月', '火', '水', '木', '金', '土', '日'];
    const JS_DAYS = ['日', '月', '火', '水', '木', '金', '土'];

    const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6'];

    const DEFAULT_USER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=0&single=true&output=csv";
    const DEFAULT_NURSE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI0jwy-uuQLiFhL8v2lQOZyPUAbi2zEdcFQ5L0Kj1FID4uft8tJNgwK1_1p5njDouz4gnAgVWE6dc7/pub?gid=1876217961&single=true&output=csv";

    const formatDateLabel = (dateStr) => {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return `${d.getMonth() + 1}/${d.getDate()}(${JS_DAYS[d.getDay()]})`;
    };

    const isNurseOff = (nurse, dateStr) => {
      if (!nurse || !dateStr) return false;
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return false;
      const jsDayOfWeek = d.getDay();
      
      if (nurse.offDays && nurse.offDays.includes(jsDayOfWeek)) return true;
      if (nurse.specificOffDays && nurse.specificOffDays.includes(dateStr)) return true;
      
      return false;
    };

    const getTodayStr = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };
    
    const getMondayStr = (dateStr) => {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d.toISOString().split('T')[0];
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [activeTab, setActiveTab] = useState('overview');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      
      const [startDate, setStartDate] = useState(getMondayStr(getTodayStr()));
      const [selectedDate, setSelectedDate] = useState(getTodayStr());
      
      const [nurses, setNurses] = useState([]);
      const [visits, setVisits] = useState([]);
      const [nurseStatuses, setNurseStatuses] = useState([]); 
      
      const [baseTravelTime, setBaseTravelTime] = useState(10);
      const [selectedNurseId, setSelectedNurseId] = useState(null);
      const [isOptimizing, setIsOptimizing] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState("");
      const [visitSortConfig, setVisitSortConfig] = useState({ key: 'startTime', direction: 'asc' });

      const [sheetUrl, setSheetUrl] = useState(DEFAULT_USER_SHEET_URL);
      const [nurseSheetUrl, setNurseSheetUrl] = useState(DEFAULT_NURSE_SHEET_URL);
      const [isLoadingSheet, setIsLoadingSheet] = useState(false);
      const [isLoadingNurseSheet, setIsLoadingNurseSheet] = useState(false);
      
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [activeCardId, setActiveCardId] = useState(null);

      const [showAddEventModal, setShowAddEventModal] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);

      useEffect(() => {
        if (showToast) {
          const timer = setTimeout(() => setShowToast(false), 4000);
          return () => clearTimeout(timer);
        }
      }, [showToast]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            const initialToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : null;
            if (initialToken) { await signInWithCustomToken(auth, initialToken); } 
            else { await signInAnonymously(auth); }
          } catch (e) { console.error("Auth error", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        setIsSyncing(true);
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.nurses) setNurses(JSON.parse(data.nurses));
            if (data.visits) setVisits(JSON.parse(data.visits));
            if (data.nurseStatuses) setNurseStatuses(JSON.parse(data.nurseStatuses));
            if (data.sheetUrl) setSheetUrl(data.sheetUrl);
            if (data.nurseSheetUrl) setNurseSheetUrl(data.nurseSheetUrl);
            if (data.baseTravelTime !== undefined) setBaseTravelTime(data.baseTravelTime);
          } else {
            setDoc(docRef, { nurses: "[]", visits: "[]", nurseStatuses: "[]", sheetUrl: DEFAULT_USER_SHEET_URL, nurseSheetUrl: DEFAULT_NURSE_SHEET_URL, baseTravelTime: 10 });
          }
          setIsSyncing(false);
        }, (err) => { console.error(err); setIsSyncing(false); });
        return () => unsubscribe();
      }, [user]);

      const updateCloudData = (newData) => {
        if (user && db) {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'careRoute_state', 'main');
          setDoc(docRef, newData, { merge: true }).catch(e => console.error(e));
        }
      };

      const handleSetVisits = (newVal) => {
        setVisits(prev => {
          const next = typeof newVal === 'function' ? newVal(prev) : newVal;
          updateCloudData({ visits: JSON.stringify(next) });
          return next;
        });
      };

      const handleSetNurses = (newVal) => {
        setNurses(prev => {
          const next = typeof newVal === 'function' ? newVal(prev) : newVal;
          updateCloudData({ nurses: JSON.stringify(next) });
          return next;
        });
      };

      const handleSetNurseStatuses = (newVal) => {
        setNurseStatuses(prev => {
          const next = typeof newVal === 'function' ? newVal(prev) : newVal;
          updateCloudData({ nurseStatuses: JSON.stringify(next) });
          return next;
        });
      };

      const handleSetBaseTravelTime = (v) => { setBaseTravelTime(v); updateCloudData({ baseTravelTime: v }); };
      const handleSheetUrlChange = (e) => { setSheetUrl(e.target.value); updateCloudData({ sheetUrl: e.target.value }); };
      const handleNurseSheetUrlChange = (e) => { setNurseSheetUrl(e.target.value); updateCloudData({ nurseSheetUrl: e.target.value }); };
      
      const handleSetStartDate = (dateStr) => {
        setStartDate(dateStr);
      };

      const displayDates = useMemo(() => {
        if (!startDate) return [];
        const dates = [];
        const start = new Date(startDate);
        
        const startJsDay = start.getDay();
        const diffToMonday = startJsDay === 0 ? -6 : 1 - startJsDay;
        start.setDate(start.getDate() + diffToMonday);

        for (let i = 0; i < 7; i++) {
          const d = new Date(start);
          d.setDate(d.getDate() + i);
          dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
      }, [startDate]);

      const handlePrevWeek = () => {
        if (!startDate) return;
        const d = new Date(startDate);
        d.setDate(d.getDate() - 7);
        handleSetStartDate(d.toISOString().split('T')[0]);
        
        const s = new Date(selectedDate);
        s.setDate(s.getDate() - 7);
        setSelectedDate(s.toISOString().split('T')[0]);
      };

      const handleNextWeek = () => {
        if (!startDate) return;
        const d = new Date(startDate);
        d.setDate(d.getDate() + 7);
        handleSetStartDate(d.toISOString().split('T')[0]);
        
        const s = new Date(selectedDate);
        s.setDate(s.getDate() + 7);
        setSelectedDate(s.toISOString().split('T')[0]);
      };

      const handlePrevDay = () => {
        if (!selectedDate) return;
        const d = new Date(selectedDate);
        d.setDate(d.getDate() - 1);
        const newDate = d.toISOString().split('T')[0];
        
        if (displayDates.length > 0 && newDate < displayDates[0]) {
           const start = new Date(startDate);
           start.setDate(start.getDate() - 7);
           handleSetStartDate(start.toISOString().split('T')[0]);
        }
        setSelectedDate(newDate);
      };

      const handleNextDay = () => {
        if (!selectedDate) return;
        const d = new Date(selectedDate);
        d.setDate(d.getDate() + 1);
        const newDate = d.toISOString().split('T')[0];
        
        if (displayDates.length > 0 && newDate > displayDates[6]) {
           const start = new Date(startDate);
           start.setDate(start.getDate() + 7);
           handleSetStartDate(start.toISOString().split('T')[0]);
        }
        setSelectedDate(newDate);
      };

      const scheduleEndDate = useMemo(() => {
        if (displayDates.length === 0) return "";
        return displayDates[displayDates.length - 1];
      }, [displayDates]);

      useEffect(() => {
        if (displayDates.length > 0 && !displayDates.includes(selectedDate)) {
          setSelectedDate(displayDates[0]);
        }
      }, [displayDates, selectedDate]);

      const handleDateChange = (dateStr) => {
        setSelectedDate(dateStr);
      };

      const currentTargetDateLabel = useMemo(() => {
        return formatDateLabel(selectedDate);
      }, [selectedDate]);

      const getIsNurseOff = (nurse, dateStr, statuses) => {
        if (!nurse) return false;
        const override = statuses.find(s => s.date === dateStr && s.nurseId === nurse.id);
        if (override && override.status) {
          return override.status === 'off';
        }
        return isNurseOff(nurse, dateStr);
      };

      const selectedNurse = useMemo(() => nurses.find(n => n.id === selectedNurseId) || nurses[0], [nurses, selectedNurseId]);
      const isSelectedNurseOff = selectedNurse ? getIsNurseOff(selectedNurse, selectedDate, nurseStatuses) : false;

      const unassignedCount = visits.filter(v => v.date === selectedDate && v.nurseId === null).length;
      
      const hasAssignedVisits = useMemo(() => {
        return visits.some(v => v.date === selectedDate && v.nurseId !== null);
      }, [visits, selectedDate]);

      const latestSyncedDate = useMemo(() => {
        if (!visits || visits.length === 0) return null;
        const dates = visits.map(v => v.date).filter(Boolean);
        if (dates.length === 0) return null;
        return dates.reduce((a, b) => a > b ? a : b);
      }, [visits]);

      const allSchedules = useMemo(() => {
        const schedules = {};
        nurses.forEach(nurse => {
          const isOff = getIsNurseOff(nurse, selectedDate, nurseStatuses);
          if (isOff) { schedules[nurse.id] = { isOff: true, visits: [], calculatedStartTime: nurse.startTime }; return; }
          
          const assigned = visits.filter(v => v.nurseId === nurse.id && v.date === selectedDate);
          const sorted = [...assigned].sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
          
          let currentTime = parseTime(nurse.startTime);
          let calculatedStartTime = currentTime;
          let calcVisits = [];
          let currentLoc = nurse.startLocation || {x:50, y:50};
          
          sorted.forEach((visit, idx) => {
            const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - currentLoc.x, 2) + Math.pow((visit.location?.y || 50) - currentLoc.y, 2));
            const travelTime = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
            
            if (idx === 0) {
              const targetStart = parseTime(visit.startTime);
              if (targetStart - travelTime > currentTime) {
                currentTime = targetStart - travelTime;
                calculatedStartTime = currentTime;
              }
            }

            const arrivalTime = currentTime + travelTime;
            const actualStart = Math.max(arrivalTime, parseTime(visit.startTime));
            
            calcVisits.push({ 
              ...visit, 
              travelTime, 
              isLate: arrivalTime > parseTime(visit.startTime), 
              waitTime: actualStart - arrivalTime, 
              arrivalTime: formatTime(arrivalTime), 
              actualStartTime: formatTime(actualStart), 
              departureTime: formatTime(actualStart + visit.duration) 
            });
            currentTime = actualStart + visit.duration; 
            currentLoc = visit.location || {x: 50, y: 50};
          });
          
          let finalTravelTime = 0, returnTime = null;
          if (calcVisits.length > 0) {
            finalTravelTime = baseTravelTime + Math.round(Math.sqrt(Math.pow(currentLoc.x - (nurse.startLocation?.x || 50), 2) + Math.pow(currentLoc.y - (nurse.startLocation?.y || 50), 2)) * 0.05);
            returnTime = formatTime(currentTime + finalTravelTime);
          } else {
            returnTime = nurse.startTime;
          }
          schedules[nurse.id] = { isOff: false, visits: calcVisits, returnTime, finalTravelTime, calculatedStartTime: formatTime(calculatedStartTime) };
        });
        return schedules;
      }, [nurses, visits, selectedDate, baseTravelTime, nurseStatuses]);

      const stats = useMemo(() => {
        const sch = selectedNurse ? allSchedules[selectedNurse.id]?.visits || [] : [];
        let tt = 0, tv = 0, lc = 0;
        sch.forEach(s => { tt += s.travelTime; tv += s.duration; if (s.isLate) lc++; });
        if (sch.length > 0 && selectedNurse && !isSelectedNurseOff) { tt += allSchedules[selectedNurse.id]?.finalTravelTime || 0; }
        return { totalTravel: tt, totalVisit: tv, count: sch.length, lateCount: lc };
      }, [allSchedules, selectedNurse, isSelectedNurseOff]);

      const unassignedVisitsWithLayout = useMemo(() => {
        const filtered = visits.filter(v => v.date === selectedDate && v.nurseId === null).sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
        
        const groups = [];
        let currentGroup = [];
        let groupEnd = 0;
        
        filtered.forEach(visit => {
          const start = parseTime(visit.startTime);
          const end = start + Math.max(visit.duration, 24); 
          
          if (currentGroup.length === 0) {
            currentGroup.push(visit);
            groupEnd = end;
          } else {
            if (start < groupEnd) {
              currentGroup.push(visit);
              groupEnd = Math.max(groupEnd, end);
            } else {
              groups.push(currentGroup);
              currentGroup = [visit];
              groupEnd = end;
            }
          }
        });
        if (currentGroup.length > 0) groups.push(currentGroup);
        
        const layouted = [];
        groups.forEach(group => {
          const cols = [];
          group.forEach(visit => {
            const start = parseTime(visit.startTime);
            let placed = false;
            for(let i = 0; i < cols.length; i++){
               const lastInCol = cols[i][cols[i].length - 1];
               const lastEnd = parseTime(lastInCol.startTime) + Math.max(lastInCol.duration, 24);
               if (lastEnd <= start) {
                 cols[i].push(visit);
                 visit._col = i;
                 placed = true;
                 break;
               }
            }
            if(!placed){
              visit._col = cols.length;
              cols.push([visit]);
            }
          });
          
          group.forEach(visit => {
            layouted.push(visit);
          });
        });
        
        return layouted;
      }, [visits, selectedDate]);

      const handleToggleExclude = (visitId) => {
        handleSetVisits(prev => prev.map(v => 
          v.id === visitId ? { ...v, isExcludedFromAutoAssign: !v.isExcludedFromAutoAssign } : v
        ));
      };

      const toggleNurseStatus = (nurseId, dateStr, isOff) => {
        handleSetNurseStatuses(prev => {
          const next = [...prev];
          const idx = next.findIndex(s => s.date === dateStr && s.nurseId === nurseId);
          if (idx !== -1) {
            if (next[idx].isLocked) return next; 
            next[idx] = { ...next[idx], status: isOff ? 'off' : 'work' };
          } else {
            next.push({ date: dateStr, nurseId, status: isOff ? 'off' : 'work', isLocked: false });
          }
          return next;
        });

        if (isOff) {
          handleSetVisits(prev => prev.map(v => 
            (v.date === dateStr && v.nurseId === nurseId && !v.isExcludedFromAutoAssign)
              ? { ...v, nurseId: null, startTime: v.originalStartTime || v.startTime, customTravelTime: null }
              : v
          ));
        }
      };

      const toggleNurseLock = (nurseId, dateStr) => {
        handleSetNurseStatuses(prev => {
          const next = [...prev];
          const idx = next.findIndex(s => s.date === dateStr && s.nurseId === nurseId);
          if (idx !== -1) {
            next[idx] = { ...next[idx], isLocked: !next[idx].isLocked };
          } else {
            const nurse = nurses.find(n => n.id === nurseId);
            const isOff = isNurseOff(nurse, dateStr);
            next.push({ date: dateStr, nurseId, status: isOff ? 'off' : 'work', isLocked: true });
          }
          return next;
        });
      };

      const handleLockAllToday = () => {
        handleSetVisits(prev => prev.map(v => 
          v.date === selectedDate ? { ...v, isExcludedFromAutoAssign: true } : v
        ));

        const currentStatuses = nurses.map(n => {
          const isOff = getIsNurseOff(n, selectedDate, nurseStatuses);
          return { date: selectedDate, nurseId: n.id, status: isOff ? 'off' : 'work', isLocked: true };
        });
        
        handleSetNurseStatuses(prev => {
          let next = [...prev];
          currentStatuses.forEach(cs => {
            const idx = next.findIndex(s => s.date === cs.date && s.nurseId === cs.nurseId);
            if (idx !== -1) {
              next[idx] = { ...next[idx], ...cs };
            } else {
              next.push(cs);
            }
          });
          return next;
        });

        setToastMessage("表示中の予定と出勤状況をすべて固定しました");
        setShowToast(true);
      };

      const handleUnlockAllToday = () => {
        handleSetVisits(prev => prev.map(v => 
          v.date === selectedDate ? { ...v, isExcludedFromAutoAssign: false } : v
        ));
        
        handleSetNurseStatuses(prev => prev.map(s => 
          s.date === selectedDate ? { ...s, isLocked: false } : s
        ));

        setToastMessage("表示中の固定をすべて解除しました");
        setShowToast(true);
      };

      const handleAutoAssign = () => {
        const available = nurses.filter(n => !getIsNurseOff(n, selectedDate, nurseStatuses));
        if (available.length === 0) { setToastMessage("出勤者がいません"); setShowToast(true); return; }
        setIsOptimizing(true);
        
        setTimeout(() => {
          try {
            const newVisits = [...visits];
            const todayUnassigned = newVisits.filter(v => v.date === selectedDate && v.nurseId === null && !v.isExcludedFromAutoAssign).sort((a,b) => parseTime(a.startTime) - parseTime(b.startTime));
            
            const states = available.map(n => {
              const mine = newVisits.filter(v => v.date === selectedDate && v.nurseId === n.id).sort((a,b) => parseTime(a.startTime) - parseTime(b.startTime));
              const last = mine.length > 0 ? mine[mine.length - 1] : null;
              
              let totalDuration = 0;
              let amDuration = 0;
              let pmDuration = 0;
              mine.forEach(v => {
                  const dur = v.duration || 30;
                  totalDuration += dur;
                  if (parseTime(v.startTime) < 12 * 60) {
                      amDuration += dur;
                  } else {
                      pmDuration += dur;
                  }
              });
              
              const endTimeMin = parseTime(n.endTime || '17:30');

              return { 
                  id: n.id, 
                  time: last ? parseTime(last.startTime) + (last.duration || 30) : parseTime(n.startTime), 
                  loc: last && last.location ? last.location : (n.startLocation || {x: 50, y: 50}),
                  totalDuration,
                  amDuration,
                  pmDuration,
                  visitCount: mine.length,
                  endTimeMin: endTimeMin
              };
            });
            
            let assignedCount = 0;

            todayUnassigned.forEach(visit => {
              let best = null;
              
              const requiresFemale = visit.requiresFemaleNurse;
              const preferredNurseNames = visit.preferredNurseNames || (visit.preferredNurseName ? [visit.preferredNurseName] : []);
              const isAM = parseTime(visit.startTime) < 12 * 60;
              const dur = visit.duration || 30;
              
              // 0. 優先担当者1, 2の順に探す (出勤していれば強制割り当て)
              for (const prefName of preferredNurseNames) {
                  if (!prefName) continue;
                  const prefNurseObj = available.find(n => n.name === prefName || n.name?.includes(prefName) || prefName.includes(n.name));
                  if (prefNurseObj) {
                      const s = states.find(st => st.id === prefNurseObj.id);
                      if (s) {
                          best = s;
                          break;
                      }
                  }
              }
              
              // 1. 優先度通常（高）の看護師から探す（訪問時間の均等化 ＋ AM/PMバランス考慮 ＋ 勤務時間内）
              if (!best) {
                let minTravel = Infinity;
                let minTotalDur = Infinity;
                let minBalance = Infinity;
                states.forEach(s => {
                  const nDef = available.find(n => n.id === s.id);
                  if (nDef && nDef.isLowPriority) return; 
                  if (requiresFemale && nDef && !nDef.isFemale) return; 
                  
                  const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - s.loc.x, 2) + Math.pow((visit.location?.y || 50) - s.loc.y, 2));
                  const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                  const expectedEnd = s.time + travel + dur;
                  
                  if (s.time + travel <= parseTime(visit.startTime) && expectedEnd <= s.endTimeMin) {
                      const balanceScore = isAM ? (s.amDuration - s.pmDuration) : (s.pmDuration - s.amDuration);
                      if (s.totalDuration < minTotalDur || 
                         (s.totalDuration === minTotalDur && balanceScore < minBalance) ||
                         (s.totalDuration === minTotalDur && balanceScore === minBalance && travel < minTravel)) {
                          minTotalDur = s.totalDuration;
                          minBalance = balanceScore;
                          minTravel = travel;
                          best = s;
                      }
                  }
                });
              }
              
              // 2. 間に合う人がいなければ、優先度低の看護師で間に合う人を探す (勤務時間内)
              if (!best) {
                let minTravel = Infinity;
                let minTotalDur = Infinity;
                let minBalance = Infinity;
                states.forEach(s => {
                  const nDef = available.find(n => n.id === s.id);
                  if (nDef && !nDef.isLowPriority) return; 
                  if (requiresFemale && nDef && !nDef.isFemale) return; 
                  
                  const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - s.loc.x, 2) + Math.pow((visit.location?.y || 50) - s.loc.y, 2));
                  const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                  const expectedEnd = s.time + travel + dur;
                  
                  if (s.time + travel <= parseTime(visit.startTime) && expectedEnd <= s.endTimeMin) {
                      const balanceScore = isAM ? (s.amDuration - s.pmDuration) : (s.pmDuration - s.amDuration);
                      if (s.totalDuration < minTotalDur || 
                         (s.totalDuration === minTotalDur && balanceScore < minBalance) ||
                         (s.totalDuration === minTotalDur && balanceScore === minBalance && travel < minTravel)) {
                          minTotalDur = s.totalDuration;
                          minBalance = balanceScore;
                          minTravel = travel;
                          best = s;
                      }
                  }
                });
              }
              
              // 3. 誰も間に合わない場合（遅延してでも割り当てる。時間均等化を考慮。ただし勤務時間内には終わる人）
              if (!best) {
                 let earliest = Infinity;
                 let isBestLow = true;
                 let minTotalDur = Infinity;
                 let minBalance = Infinity;
                 states.forEach(s => {
                   const nDef = available.find(n => n.id === s.id);
                   if (requiresFemale && nDef && !nDef.isFemale) return; 
                   const isLow = nDef ? !!nDef.isLowPriority : false;
                   
                   const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - s.loc.x, 2) + Math.pow((visit.location?.y || 50) - s.loc.y, 2));
                   const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                   const arrival = s.time + travel;
                   const expectedEnd = Math.max(arrival, parseTime(visit.startTime)) + dur;
                   const balanceScore = isAM ? (s.amDuration - s.pmDuration) : (s.pmDuration - s.amDuration);
                   
                   if (expectedEnd <= s.endTimeMin) {
                       if (arrival < earliest || 
                          (arrival === earliest && isBestLow && !isLow) ||
                          (arrival === earliest && isBestLow === isLow && s.totalDuration < minTotalDur) ||
                          (arrival === earliest && isBestLow === isLow && s.totalDuration === minTotalDur && balanceScore < minBalance)) { 
                           earliest = arrival; 
                           best = s; 
                           isBestLow = isLow;
                           minTotalDur = s.totalDuration;
                           minBalance = balanceScore;
                       }
                   }
                 });
              }
              
              // 4. それでもダメなら、勤務時間を無視して（残業）一番早く着く・あるいは件数が少ない人に割り当て
              if (!best) {
                 let earliest = Infinity;
                 let isBestLow = true;
                 let minTotalDur = Infinity;
                 let minBalance = Infinity;
                 states.forEach(s => {
                   const nDef = available.find(n => n.id === s.id);
                   if (requiresFemale && nDef && !nDef.isFemale) return; 
                   const isLow = nDef ? !!nDef.isLowPriority : false;
                   
                   const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - s.loc.x, 2) + Math.pow((visit.location?.y || 50) - s.loc.y, 2));
                   const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                   const arrival = s.time + travel;
                   const balanceScore = isAM ? (s.amDuration - s.pmDuration) : (s.pmDuration - s.amDuration);
                   
                   if (arrival < earliest || 
                      (arrival === earliest && isBestLow && !isLow) ||
                      (arrival === earliest && isBestLow === isLow && s.totalDuration < minTotalDur) ||
                      (arrival === earliest && isBestLow === isLow && s.totalDuration === minTotalDur && balanceScore < minBalance)) { 
                       earliest = arrival; 
                       best = s; 
                       isBestLow = isLow;
                       minTotalDur = s.totalDuration;
                       minBalance = balanceScore;
                   }
                 });
              }

              if (best) {
                const vIdx = newVisits.findIndex(v => v.id === visit.id);
                newVisits[vIdx].nurseId = best.id;
                const dist = Math.sqrt(Math.pow((visit.location?.x || 50) - best.loc.x, 2) + Math.pow((visit.location?.y || 50) - best.loc.y, 2));
                const travel = visit.customTravelTime ?? (baseTravelTime + Math.round(dist * 0.05));
                
                best.time = Math.max(best.time + travel, parseTime(visit.startTime)) + dur;
                best.loc = visit.location || {x: 50, y: 50};
                best.totalDuration += dur;
                if (isAM) {
                    best.amDuration += dur;
                } else {
                    best.pmDuration += dur;
                }
                best.visitCount++;
                assignedCount++;
              }
            });
            
            handleSetVisits(newVisits); 
            setIsOptimizing(false); 
            if(assignedCount === 0) {
              setToastMessage("自動編成できる対象がありませんでした");
            } else {
              setToastMessage("自動編成完了"); 
            }
            setShowToast(true);
          } catch (error) {
            console.error("AutoAssign Error:", error);
            setIsOptimizing(false);
            setToastMessage("自動編成中にエラーが発生しました。");
            setShowToast(true);
          }
        }, 800);
      };

      const executeResetAssignments = () => {
        handleSetVisits(prev => prev.map(v => {
          if (v.date === selectedDate && !v.isExcludedFromAutoAssign) {
            return {
              ...v,
              nurseId: null,
              startTime: v.originalStartTime || v.startTime,
              customTravelTime: null
            };
          }
          return v;
        }));
        setShowResetConfirm(false);
        setToastMessage("固定された予定を除き、リセットしました");
        setShowToast(true);
      };

      const handleDrop = (e, targetNurseId) => {
        e.preventDefault();
        const visitId = parseInt(e.dataTransfer.getData('text/plain'), 10);
        if (isNaN(visitId)) return;
        
        const targetVisit = visits.find(v => v.id === visitId);
        
        if (targetVisit && targetVisit.isExcludedFromAutoAssign) {
            return;
        }

        if (targetNurseId && targetVisit && targetVisit.requiresFemaleNurse) {
            const targetNurse = nurses.find(n => n.id === targetNurseId);
            if (targetNurse && !targetNurse.isFemale) {
                setToastMessage("この利用者は女性看護師限定です");
                setShowToast(true);
                return;
            }
        }

        const offsetY = parseFloat(e.dataTransfer.getData('offsetY') || 0);
        const rect = e.currentTarget.getBoundingClientRect();
        const y = (e.clientY - rect.top) - offsetY;
        const minutes = y / PIXELS_PER_MINUTE + START_HOUR * 60;
        const snappedMinutes = Math.round(minutes / 15) * 15; 
        const newStartTime = formatTime(Math.max(START_HOUR * 60, Math.min(END_HOUR * 60 - 15, snappedMinutes)));
        
        handleSetVisits(prev => prev.map(v => {
          if (v.id === visitId) {
             const original = v.originalStartTime || v.startTime;
             return { ...v, nurseId: targetNurseId, startTime: newStartTime, originalStartTime: original, date: selectedDate };
          }
          return v;
        }));
      };

      const updateVisitNurse = (visitId, newNurseId) => {
        const parsedNurseId = newNurseId === 'unassigned' ? null : parseInt(newNurseId);
        const targetVisit = visits.find(v => v.id === visitId);
        
        if (parsedNurseId && targetVisit && targetVisit.requiresFemaleNurse) {
            const targetNurse = nurses.find(n => n.id === parsedNurseId);
            if (targetNurse && !targetNurse.isFemale) {
                setToastMessage("この利用者は女性看護師限定です");
                setShowToast(true);
                return;
            }
        }
        
        handleSetVisits(visits.map(v => v.id === visitId ? { ...v, nurseId: parsedNurseId } : v));
      };

      const updateCustomTravelTime = (visitId, newTime) => {
        handleSetVisits(prev => prev.map(v => v.id === visitId ? { ...v, customTravelTime: newTime } : v));
      };

      const handleAddEvent = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const title = formData.get('title');
        const startTime = formData.get('startTime');
        const duration = parseInt(formData.get('duration'), 10);
        const nurseIdStr = formData.get('nurseId');
        const isLocked = formData.get('isLocked') === 'on';
        
        const baseEvent = {
          userName: title,
          type: 'other',
          date: selectedDate,
          dayOfWeek: new Date(selectedDate).getDay(),
          startTime: startTime,
          originalStartTime: startTime,
          duration: duration,
          requiresFemaleNurse: false,
          preferredNurseNames: [],
          isExcludedFromAutoAssign: isLocked,
          location: { x: 50, y: 50 } 
        };

        const newEvents = [];
        if (nurseIdStr === 'all') {
          const availableNurses = nurses.filter(n => !getIsNurseOff(n, selectedDate, nurseStatuses));
          availableNurses.forEach((n, idx) => {
            newEvents.push({
              ...baseEvent,
              id: Date.now() + idx,
              nurseId: n.id,
              location: n.startLocation || { x: 50, y: 50 }
            });
          });
        } else {
          const nId = nurseIdStr === 'unassigned' ? null : parseInt(nurseIdStr, 10);
          const targetNurse = nurses.find(n => n.id === nId);
          newEvents.push({
            ...baseEvent,
            id: Date.now(),
            nurseId: nId,
            location: targetNurse?.startLocation || { x: 50, y: 50 }
          });
        }
        
        handleSetVisits([...visits, ...newEvents]);
        setShowAddEventModal(false);
        setToastMessage("予定を追加しました");
        setShowToast(true);
      };

      const handleFetchSheet = async () => {
        setIsLoadingSheet(true);
        try {
          const res = await fetch(sheetUrl);
          const txt = await res.text();
          const rows = txt.split(/\r\n|\n/);
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          const result = [];
          
          for (let i = 1; i < rows.length; i++) {
            const p = rows[i].split(',');
            if (p[0]?.trim()) {
              const nameStr = p[0].trim();
              const dateOrDay = p[1]?.trim() || '';
              let st = p[2]?.trim() || '09:00'; if (st.length === 4) st = '0' + st;
              const dur = parseInt(p[3]) || 30;
              const requiresFemale = p[4] ? p[4].includes('女性') : false;
              
              const prefNurse1 = p[5]?.trim() || null;
              const prefNurse2 = p[6]?.trim() || null;
              const preferredNames = [prefNurse1, prefNurse2].filter(Boolean);
              
              const address = p[7]?.trim() || '';

              let visitDate = '';
              if (dateOrDay.includes('/') || dateOrDay.includes('-')) {
                visitDate = dateOrDay.replace(/\//g, '-');
              } else {
                const targetDay = dayMap[dateOrDay];
                if (targetDay !== undefined && startDate) {
                  const start = new Date(startDate);
                  const startDay = start.getDay();
                  let diff = targetDay - startDay;
                  if (diff < 0) diff += 7;
                  start.setDate(start.getDate() + diff);
                  visitDate = start.toISOString().split('T')[0];
                } else {
                  visitDate = startDate || new Date().toISOString().split('T')[0];
                }
              }

              result.push({ 
                id: Date.now() + i, 
                userName: nameStr.includes('様') ? nameStr : nameStr + ' 様', 
                location: getHashLoc(address || nameStr), 
                duration: dur, 
                date: visitDate, 
                dayOfWeek: dayMap[dateOrDay] ?? 1, 
                startTime: st, 
                originalStartTime: st, 
                nurseId: null,
                requiresFemaleNurse: requiresFemale,
                preferredNurseNames: preferredNames,
                address: address,
                isExcludedFromAutoAssign: false
              });
            }
          }
          
          const newVisits = [...visits];
          let addedCount = 0;
          let updatedCount = 0;

          result.forEach(nv => {
            const existingIndex = newVisits.findIndex(v => 
              normalizeName(v.userName) === normalizeName(nv.userName) && 
              v.date === nv.date && 
              v.originalStartTime === nv.originalStartTime
            );
            
            if (existingIndex !== -1) {
              newVisits[existingIndex] = { 
                ...nv, 
                id: newVisits[existingIndex].id, 
                nurseId: newVisits[existingIndex].nurseId, 
                startTime: newVisits[existingIndex].startTime, 
                customTravelTime: newVisits[existingIndex].customTravelTime,
                isExcludedFromAutoAssign: newVisits[existingIndex].isExcludedFromAutoAssign 
              };
              updatedCount++;
            } else {
              newVisits.push(nv);
              addedCount++;
            }
          });
          
          handleSetVisits(newVisits); 
          setToastMessage(`同期完了: 新規追加 ${addedCount}件 / 更新 ${updatedCount}件`); 
          setShowToast(true);
        } catch (e) { setToastMessage("データの同期に失敗"); setShowToast(true); } 
        finally { setIsLoadingSheet(false); }
      };

      const handleFetchNurseSheet = async () => {
        setIsLoadingNurseSheet(true);
        try {
          const res = await fetch(nurseSheetUrl);
          const txt = await res.text();
          const rows = txt.split(/\r\n|\n/);
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
          const result = [];
          
          for (let i = 1; i < rows.length; i++) {
            const p = rows[i].split(',');
            if (p[0]?.trim()) {
              const nameStr = p[0].trim();
              let st = p[1]?.trim() || '08:30'; if (st.length === 4) st = '0' + st;
              let et = p[2]?.trim() || '17:30'; if (et.length === 4) et = '0' + et;
              
              let off = []; 
              if (p[3]) {
                  Object.keys(dayMap).forEach(d => { if (p[3].includes(d)) off.push(dayMap[d]); });
              }
              
              const isLow = p[4] ? p[4].includes('低') : false;
              const isFemale = p[5] ? p[5].includes('女性') : false;
              
              let specificOffDays = [];
              if (p[6]) {
                 const dates = p[6].split('・').map(d => d.trim().replace(/\//g, '-'));
                 specificOffDays = specificOffDays.concat(dates.filter(d => d.length > 0));
              }

              const address = p[7]?.trim() || '';
              
              result.push({ 
                id: Date.now() + i, 
                name: nameStr, 
                startLocation: getHashLoc(address || nameStr), 
                color: colors[result.length % colors.length], 
                startTime: st, 
                endTime: et,
                offDays: off, 
                specificOffDays: specificOffDays,
                isLowPriority: isLow,
                isFemale: isFemale
              });
            }
          }
          
          handleSetNurses(result); 
          setToastMessage("看護師名簿の同期成功"); 
          setShowToast(true);
        } catch (e) { setToastMessage("名簿の同期に失敗"); setShowToast(true); } 
        finally { setIsLoadingNurseSheet(false); }
      };

      const requestVisitSort = (key) => {
        setVisitSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc' }));
      };

      const sortedVisits = useMemo(() => {
        let filtered = visits.filter(v => v.date === selectedDate);
        if (visitSortConfig.key) {
          filtered.sort((a, b) => {
            let valA, valB;
            if (visitSortConfig.key === 'startTime') { 
              valA = parseTime(a.startTime); 
              valB = parseTime(b.startTime); 
            }
            else if (visitSortConfig.key === 'nurseName') {
              const nA = nurses.find(n => n.id === a.nurseId); 
              const nB = nurses.find(n => n.id === b.nurseId);
              valA = nA ? nA.name : '未指定'; 
              valB = nB ? nB.name : '未指定';
              
              if (valA === valB) {
                return parseTime(a.startTime) - parseTime(b.startTime);
              }
            } else { 
              valA = a[visitSortConfig.key]; 
              valB = b[visitSortConfig.key]; 
            }
            if (valA < valB) return visitSortConfig.direction === 'asc' ? -1 : 1;
            if (valA > valB) return visitSortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return filtered;
      }, [visits, selectedDate, visitSortConfig, nurses]);

      return (
        <div className="flex flex-col md:flex-row h-screen bg-[#F8FAFC] text-slate-800 font-sans overflow-hidden">
          <aside className={`bg-slate-900 text-slate-300 hidden md:flex flex-col shrink-0 border-r border-slate-800 transition-all duration-300 relative ${isSidebarOpen ? 'w-72' : 'w-20'}`}>
            <button 
              onClick={() => setIsSidebarOpen(!isSidebarOpen)}
              className="absolute -right-3 top-8 bg-slate-800 text-slate-300 p-1.5 rounded-full border border-slate-700 hover:text-white hover:bg-slate-700 z-50 transition-colors"
            >
              {isSidebarOpen ? <ChevronLeft size={16} /> : <ChevronRight size={16} />}
            </button>
            <div className={`p-6 ${isSidebarOpen ? '' : 'flex flex-col items-center px-2'}`}>
              <div className={`flex items-center gap-3 text-white font-black mb-2 ${isSidebarOpen ? 'text-2xl' : 'text-xl justify-center'}`}>
                <div className="bg-teal-500 p-2 rounded-xl shadow-lg shadow-teal-500/20 shrink-0">
                  <Activity className="text-white" size={isSidebarOpen ? 24 : 20} />
                </div>
                {isSidebarOpen && <span>CareRoute</span>}
              </div>
              {isSidebarOpen && <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest pl-1 whitespace-nowrap overflow-hidden">Route Optimization v2.5</p>}
            </div>
            <nav className={`flex-1 space-y-1.5 mt-2 ${isSidebarOpen ? 'px-4' : 'px-2'}`}>
              <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-between px-5' : 'justify-center px-0'} py-4 rounded-2xl transition-all group ${activeTab === 'overview' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`} title={!isSidebarOpen ? "全体スケジュール" : ""}>
                <div className={`flex items-center ${isSidebarOpen ? 'gap-4' : ''}`}>
                  <Columns size={22} className="shrink-0" />
                  {isSidebarOpen && <span className="font-bold whitespace-nowrap">全体スケジュール</span>}
                </div>
                {isSidebarOpen && <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'overview' ? 'opacity-100' : ''}`} />}
              </button>
              <button onClick={() => setActiveTab('schedule')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-between px-5' : 'justify-center px-0'} py-4 rounded-2xl transition-all group ${activeTab === 'schedule' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`} title={!isSidebarOpen ? "個別ルート確認" : ""}>
                <div className={`flex items-center ${isSidebarOpen ? 'gap-4' : ''}`}>
                  <Calendar size={22} className="shrink-0" />
                  {isSidebarOpen && <span className="font-bold whitespace-nowrap">個別ルート確認</span>}
                </div>
                {isSidebarOpen && <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'schedule' ? 'opacity-100' : ''}`} />}
              </button>
              <button onClick={() => setActiveTab('visits')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-between px-5' : 'justify-center px-0'} py-4 rounded-2xl transition-all group ${activeTab === 'visits' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`} title={!isSidebarOpen ? "利用者管理" : ""}>
                <div className={`flex items-center ${isSidebarOpen ? 'gap-4' : ''}`}>
                  <Users size={22} className="shrink-0" />
                  {isSidebarOpen && <span className="font-bold whitespace-nowrap">利用者管理</span>}
                </div>
                {isSidebarOpen && <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'visits' ? 'opacity-100' : ''}`} />}
              </button>
              <button onClick={() => setActiveTab('nurses')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-between px-5' : 'justify-center px-0'} py-4 rounded-2xl transition-all group ${activeTab === 'nurses' ? 'bg-teal-600 text-white shadow-xl shadow-teal-900/30' : 'hover:bg-slate-800/50 hover:text-white'}`} title={!isSidebarOpen ? "看護師管理" : ""}>
                <div className={`flex items-center ${isSidebarOpen ? 'gap-4' : ''}`}>
                  <UserCog size={22} className="shrink-0" />
                  {isSidebarOpen && <span className="font-bold whitespace-nowrap">看護師管理</span>}
                </div>
                {isSidebarOpen && <ChevronRight size={16} className={`opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === 'nurses' ? 'opacity-100' : ''}`} />}
              </button>

          </main>

          {showAddEventModal && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4">
              <div className="bg-white rounded-[2rem] p-8 max-w-md w-full shadow-2xl">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-2xl font-black text-slate-800">予定を追加</h3>
                  <button onClick={() => setShowAddEventModal(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><X size={20} /></button>
                </div>
                <form onSubmit={handleAddEvent} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">タイトル (会議・研修など)</label>
                    <input required type="text" name="title" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-teal-500 font-bold" />
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs font-bold text-slate-500 mb-1">開始時間</label>
                      <input required type="time" name="startTime" defaultValue="12:00" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-teal-500 font-bold" />
                    </div>
                    <div className="w-28">
                      <label className="block text-xs font-bold text-slate-500 mb-1">時間(分)</label>
                      <input required type="number" name="duration" defaultValue="60" step="5" min="5" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-teal-500 font-bold" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">担当者</label>
                    <select name="nurseId" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-teal-500 font-bold">
                      <option value="unassigned">未割り当て</option>
                      <option value="all">全員 (出勤中の全員に追加)</option>
                      {nurses.map(n => <option key={n.id} value={n.id}>{n.name}</option>)}
                    </select>
                  </div>
                  <div className="flex items-center gap-2 mt-4 bg-red-50 p-3 rounded-xl border border-red-100">
                     <input type="checkbox" id="lockEvent" name="isLocked" defaultChecked className="w-4 h-4 text-teal-600 rounded border-slate-300 focus:ring-teal-500" />
                     <label htmlFor="lockEvent" className="text-sm font-bold text-red-600">自動編成から除外（時間を固定する）</label>
                  </div>
                  <button type="submit" className="w-full mt-6 py-4 rounded-2xl font-black text-white bg-teal-600 hover:bg-teal-700 transition-colors shadow-lg shadow-teal-600/30">
                    追加する
                  </button>
                </form>
              </div>
            </div>
          )}

          {deleteConfirmId && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4">
              <div className="bg-white rounded-[2rem] p-8 max-w-md w-full shadow-2xl">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 mx-auto">
                  <Trash2 size={32} />
                </div>
                <h3 className="text-2xl font-black text-slate-800 text-center mb-2">予定の削除</h3>
                <p className="text-sm font-bold text-slate-500 text-center mb-8 leading-relaxed">
                  この予定を削除しますか？<br/>
                  <span className="text-xs text-red-500">※スプレッドシートの訪問予定の場合は、再度同期すると復活します。</span>
                </p>
                <div className="flex gap-4">
                  <button onClick={() => setDeleteConfirmId(null)} className="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors">キャンセル</button>
                  <button onClick={() => {
                     handleSetVisits(prev => prev.filter(v => v.id !== deleteConfirmId));
                     setDeleteConfirmId(null);
                     setToastMessage("予定を削除しました");
                     setShowToast(true);
                  }} className="flex-1 py-4 rounded-2xl font-black text-white bg-red-500 hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">削除する</button>
                </div>
              </div>
            </div>
          )}

          {showResetConfirm && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4">
              <div className="bg-white rounded-[2rem] p-8 max-w-md w-full shadow-2xl">
                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 mx-auto">
                  <AlertTriangle size={32} />
                </div>
                <h3 className="text-2xl font-black text-slate-800 text-center mb-2">割り当てをリセット</h3>
                <p className="text-sm font-bold text-slate-500 text-center mb-8 leading-relaxed">
                  {formatDateLabel(selectedDate)} の割り当てを解除し、未割り当てに戻します。<br/>
                  <span className="text-red-500 font-black text-xs">※固定（ロック）されている予定は残ります</span>
                </p>
                <div className="flex gap-4">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors">キャンセル</button>
                  <button onClick={executeResetAssignments} className="flex-1 py-4 rounded-2xl font-black text-white bg-red-500 hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">リセットする</button>
                </div>
              </div>
            </div>
          )}

          {showToast && (
            <div onClick={() => setShowToast(false)} className="fixed bottom-6 right-6 md:bottom-10 md:right-10 glass-effect text-slate-900 px-6 py-4 md:px-8 md:py-5 rounded-[1.5rem] md:rounded-[2rem] shadow-2xl flex items-center gap-3 md:gap-4 animate-bounce z-[100] border border-white shadow-teal-500/20 cursor-pointer max-w-[90vw]">
              <div className="bg-emerald-500 p-1.5 md:p-2 rounded-lg md:rounded-xl text-white shadow-lg shadow-emerald-200 shrink-0">
                <CheckCircle2 size={20} className="md:w-6 md:h-6" />
              </div>
              <span className="font-black text-xs md:text-sm tracking-tight">{toastMessage}</span>
            </div>
          )}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
