<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪問看護ルート最適化アプリ</title>
  
  <!-- Tailwind CSS (デザインを整えるためのツール) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Reactとアイコンをブラウザ上で直接読み込むための設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <!-- JSXコードをブラウザで実行できるようにするツール -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- アプリが表示される場所 -->
  <div id="root"></div>

  <!-- アプリのプログラム本体 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, Users, Map as MapIcon, Clock, MapPin, RefreshCw, Plus, Trash2, ArrowRight, CheckCircle2, UserPlus, Activity, Upload, AlertTriangle, CalendarDays, Link as LinkIcon, UserCog, Columns } from 'lucide-react';

    // --- タイムライン用の定数 ---
    const START_HOUR = 7; // 朝7時から開始
    const END_HOUR = 19;  // 夜19時まで表示
    const PIXELS_PER_MINUTE = 1.5; // 1分あたりのピクセル数 (1時間 = 90px)
    const getTop = (minutes) => (minutes - START_HOUR * 60) * PIXELS_PER_MINUTE;

    // --- ユーティリティ関数 ---
    const parseTime = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    };

    const formatTime = (minutes) => {
      if (isNaN(minutes)) return "00:00";
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };

    const normalizeName = (name) => {
      if (!name) return "";
      return name.replace(/[\s　]/g, '').replace(/様$/, '');
    };

    // 名前から固定の座標を生成する関数 (同じ人なら必ず同じ家・座標になる)
    const getHashLoc = (str) => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return { 
        x: Math.abs(hash % 80) + 10, 
        y: Math.abs((hash >> 3) % 80) + 10 
      };
    };

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];

    // 色のパレット (看護師追加時に自動割り当て)
    const colors = ['#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6'];

    // スプレッドシート管理に限定するため、初期の看護師データは空にする
    const initialNurses = [];

    // スプレッドシート管理に限定するため、初期の訪問予定データも空にする
    const initialVisits = [];

    function App() {
      // 初期タブを「全体スケジュール」に設定
      const [activeTab, setActiveTab] = useState('overview');
      const [selectedDay, setSelectedDay] = useState(1);
      
      // ローカルストレージからデータを読み込む (看護師リスト)
      const [nurses, setNurses] = useState(() => {
        try {
          const saved = localStorage.getItem("careRoute_nurses");
          return saved ? JSON.parse(saved) : initialNurses;
        } catch (e) {
          return initialNurses;
        }
      });

      // ローカルストレージからデータを読み込む (訪問予定リスト)
      const [visits, setVisits] = useState(() => {
        try {
          const saved = localStorage.getItem("careRoute_visits");
          return saved ? JSON.parse(saved) : initialVisits;
        } catch (e) {
          return initialVisits;
        }
      });
      
      const [selectedNurseId, setSelectedNurseId] = useState(null);
      
      const [isOptimizing, setIsOptimizing] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState("");
      
      // 利用者用スプレッドシート連携用の状態 (自動保存されたURLを読み込む)
      const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem("careRoute_userSheetUrl") || localStorage.getItem("careRoute_patientSheetUrl") || "");
      const [isLoadingSheet, setIsLoadingSheet] = useState(false);

      // 看護師用スプレッドシート連携用の状態 (自動保存されたURLを読み込む)
      const [nurseSheetUrl, setNurseSheetUrl] = useState(() => localStorage.getItem("careRoute_nurseSheetUrl") || "");
      const [isLoadingNurseSheet, setIsLoadingNurseSheet] = useState(false);

      // --- 状態の変更をローカルストレージに自動保存する ---
      useEffect(() => {
        localStorage.setItem("careRoute_nurses", JSON.stringify(nurses));
      }, [nurses]);

      useEffect(() => {
        localStorage.setItem("careRoute_visits", JSON.stringify(visits));
      }, [visits]);

      // URLが変更されたらローカルストレージに自動保存する
      const handleSheetUrlChange = (e) => {
        const url = e.target.value;
        setSheetUrl(url);
        localStorage.setItem("careRoute_userSheetUrl", url);
      };

      const handleNurseSheetUrlChange = (e) => {
        const url = e.target.value;
        setNurseSheetUrl(url);
        localStorage.setItem("careRoute_nurseSheetUrl", url);
      };

      const selectedNurse = useMemo(() => nurses.find(n => n.id === selectedNurseId) || nurses[0], [nurses, selectedNurseId]);
      const isSelectedNurseOff = selectedNurse ? (selectedNurse.offDays || []).includes(selectedDay) : false;

      // --- ドラッグ&ドロップのハンドラー ---
      const handleDrop = (e, targetNurseId) => {
        e.preventDefault();
        const visitId = parseInt(e.dataTransfer.getData('text/plain'), 10);
        if (isNaN(visitId)) return;
        
        // ドラッグ開始時のマウスのYオフセットを取得
        const offsetYStr = e.dataTransfer.getData('offsetY');
        const offsetY = offsetYStr ? parseFloat(offsetYStr) : 0;
        
        // ドロップされた列の要素からの相対座標を計算
        const rect = e.currentTarget.getBoundingClientRect();
        const y = (e.clientY - rect.top) - offsetY;
        
        // Y座標から開始時間(分)を計算 (5分刻みにスナップ)
        const minutes = y / PIXELS_PER_MINUTE + START_HOUR * 60;
        const snappedMinutes = Math.round(minutes / 5) * 5; 
        
        // 時間を7:00〜19:00の範囲内に制限
        const finalMinutes = Math.max(START_HOUR * 60, Math.min(END_HOUR * 60 - 5, snappedMinutes));
        const newStartTime = formatTime(finalMinutes);
        
        setVisits(prevVisits => prevVisits.map(v => {
          if (v.id === visitId) {
             const original = v.originalStartTime || v.startTime;
             return { ...v, nurseId: targetNurseId, startTime: newStartTime, originalStartTime: original };
          }
          return v;
        }));
      };

      // --- 全体スケジュールと移動時間の計算 ---
      const allSchedules = useMemo(() => {
        const schedulesByNurse = {};
        
        nurses.forEach(nurse => {
          const isOff = (nurse.offDays || []).includes(selectedDay);
          if (isOff) {
            schedulesByNurse[nurse.id] = { isOff: true, visits: [] };
            return;
          }
          
          const assignedVisits = visits.filter(v => v.nurseId === nurse.id && v.dayOfWeek === selectedDay);
          const sortedVisits = [...assignedVisits].sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));
          
          let currentTime = parseTime(nurse.startTime);
          let calcVisits = [];
          let currentLoc = nurse.startLocation;

          sortedVisits.forEach((visit) => {
            const dist = Math.sqrt(Math.pow(visit.location.x - currentLoc.x, 2) + Math.pow(visit.location.y - currentLoc.y, 2));
            // 距離に対して0.3を掛け、最低でも5分はかかるようにして現実的な車移動の時間に近づける
            const travelTime = Math.max(5, Math.round(dist * 0.3));
            const targetStart = parseTime(visit.startTime);
            const arrivalTime = currentTime + travelTime;
            const isLate = arrivalTime > targetStart;
            const actualStart = Math.max(arrivalTime, targetStart);
            const waitTime = actualStart > arrivalTime ? actualStart - arrivalTime : 0;
            const departureTime = actualStart + visit.duration;

            calcVisits.push({
              ...visit,
              travelTime,
              waitTime,
              isLate,
              arrivalTime: formatTime(arrivalTime),
              actualStartTime: formatTime(actualStart),
              departureTime: formatTime(departureTime)
            });

            currentTime = departureTime;
            currentLoc = visit.location;
          });

          let returnTime = null;
          let finalTravelTime = 0;
          if (calcVisits.length > 0) {
            const finalDist = Math.sqrt(Math.pow(currentLoc.x - nurse.startLocation.x, 2) + Math.pow(currentLoc.y - nurse.startLocation.y, 2));
            finalTravelTime = Math.max(5, Math.round(finalDist * 0.3));
            returnTime = formatTime(currentTime + finalTravelTime);
          }

          schedulesByNurse[nurse.id] = { isOff: false, visits: calcVisits, returnTime, finalTravelTime };
        });
        
        return schedulesByNurse;
      }, [nurses, visits, selectedDay]);

      // 個別スケジュール用 (既存の流用)
      const schedule = selectedNurse ? allSchedules[selectedNurse.id]?.visits || [] : [];

      const stats = useMemo(() => {
        let totalTravel = 0;
        let totalVisit = 0;
        let lateCount = 0;
        schedule.forEach(s => {
          totalTravel += s.travelTime;
          totalVisit += s.duration;
          if (s.isLate) lateCount++;
        });
        if (schedule.length > 0 && selectedNurse) {
          totalTravel += allSchedules[selectedNurse.id]?.finalTravelTime || 0;
        }
        return { totalTravel, totalVisit, count: schedule.length, lateCount };
      }, [schedule, allSchedules, selectedNurse]);

      // --- 自動編成ロジック (優先順位対応版) ---
      const handleAutoAssign = () => {
        // その日に出勤している(休みではない)看護師のみを抽出
        const availableNurses = nurses.filter(n => !(n.offDays || []).includes(selectedDay));

        if (availableNurses.length === 0) {
          setToastMessage(`この曜日に出勤している看護師がいません。`);
          setShowToast(true);
          setTimeout(() => setShowToast(false), 3000);
          return;
        }

        setIsOptimizing(true);
        setTimeout(() => {
          const newVisits = [...visits];
          const unassignedToday = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null);
          unassignedToday.sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));

          const nurseStates = availableNurses.map(n => {
            const myVisits = newVisits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === n.id);
            if (myVisits.length === 0) {
              return { id: n.id, time: parseTime(n.startTime), loc: n.startLocation };
            }
            const last = myVisits.sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime)).pop();
            return { id: n.id, time: parseTime(last.startTime) + last.duration, loc: last.location };
          });

          unassignedToday.forEach(visit => {
            const targetStart = parseTime(visit.startTime);
            let bestNurse = null;
            let minTravel = Infinity;

            // 1. まず優先度が「通常」の看護師から間に合う人を探す
            nurseStates.forEach(ns => {
              const nurseDef = availableNurses.find(n => n.id === ns.id);
              if (nurseDef && nurseDef.isLowPriority) return; // 優先度低はスキップ

              const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
              const travel = Math.max(5, Math.round(dist * 0.3));
              if (ns.time + travel <= targetStart) {
                if (travel < minTravel) {
                  minTravel = travel;
                  bestNurse = ns;
                }
              }
            });

            // 2. 通常優先度で間に合う人がいなければ、優先度「低」の看護師から間に合う人を探す
            if (!bestNurse) {
              minTravel = Infinity;
              nurseStates.forEach(ns => {
                const nurseDef = availableNurses.find(n => n.id === ns.id);
                if (nurseDef && !nurseDef.isLowPriority) return; // 優先度低の人だけを対象にする

                const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
                const travel = Math.max(5, Math.round(dist * 0.3));
                if (ns.time + travel <= targetStart) {
                  if (travel < minTravel) {
                    minTravel = travel;
                    bestNurse = ns;
                  }
                }
              });
            }

            // 3. 誰も間に合わない場合、全体から一番遅刻がマシな人を探す
            if (!bestNurse) {
              let earliest = Infinity;
              let isBestNurseLowPriority = true;

              nurseStates.forEach(ns => {
                const nurseDef = availableNurses.find(n => n.id === ns.id);
                const isLow = nurseDef ? !!nurseDef.isLowPriority : false;

                const dist = Math.sqrt(Math.pow(visit.location.x - ns.loc.x, 2) + Math.pow(visit.location.y - ns.loc.y, 2));
                const arrival = ns.time + Math.max(5, Math.round(dist * 0.3));

                // より早く着く、または同じ時間だけど優先度が通常の人を優先する
                if (arrival < earliest || (arrival === earliest && isBestNurseLowPriority && !isLow)) {
                  earliest = arrival;
                  bestNurse = ns;
                  isBestNurseLowPriority = isLow;
                }
              });
            }

            if (bestNurse) {
              const vIdx = newVisits.findIndex(v => v.id === visit.id);
              newVisits[vIdx].nurseId = bestNurse.id;
              const dist = Math.sqrt(Math.pow(visit.location.x - bestNurse.loc.x, 2) + Math.pow(visit.location.y - bestNurse.loc.y, 2));
              bestNurse.time = Math.max(bestNurse.time + Math.max(5, Math.round(dist * 0.3)), targetStart) + visit.duration;
              bestNurse.loc = visit.location;
            }
          });

          setVisits(newVisits);
          setIsOptimizing(false);
          setToastMessage(`${DAYS[selectedDay]}曜日の担当者を自動編成しました`);
          setShowToast(true);
          setTimeout(() => setShowToast(false), 3000);
        }, 800);
      };

      const updateVisitNurse = (visitId, newNurseId) => {
        const parsedNurseId = newNurseId === 'unassigned' ? null : parseInt(newNurseId);
        setVisits(visits.map(v => v.id === visitId ? { ...v, nurseId: parsedNurseId } : v));
      };


      // --- Googleスプレッドシートから利用者インポート (完全上書き仕様) ---
      const handleFetchSheet = async () => {
        if (!sheetUrl) {
          setToastMessage("スプレッドシートのURLを入力してください");
          setShowToast(true);
          setTimeout(() => setShowToast(false), 3000);
          return;
        }

        setIsLoadingSheet(true);
        try {
          const response = await fetch(sheetUrl);
          if (!response.ok) throw new Error('ネットワークエラー');
          const text = await response.text();
          const lines = text.split(/\r\n|\n/);
          if (lines.length < 2) throw new Error('データがありません');

          const imported = [];
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };

          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split(',');
            
            if (parts.length > 0 && parts[0].trim()) {
              const name = parts[0].trim();
              const dayStr = parts.length > 1 ? parts[1].trim() : '';
              const dayOfWeek = dayMap[dayStr] !== undefined ? dayMap[dayStr] : 1;
              
              let startTime = parts.length > 2 && parts[2].trim() ? parts[2].trim() : '09:00';
              if (startTime.length === 4) startTime = '0' + startTime;
              
              const duration = parts.length > 3 && !isNaN(parseInt(parts[3])) ? parseInt(parts[3]) : 30;

              const newVisit = {
                id: Date.now() + i,
                userName: name.includes('様') ? name : `${name} 様`,
                location: getHashLoc(name), // 名前から固定の座標を割り当てる
                duration: duration,
                dayOfWeek: dayOfWeek,
                startTime: startTime,
                originalStartTime: startTime,
                nurseId: null
              };

              // ファイル内での重複はスキップ
              const isDuplicate = imported.some(v => 
                normalizeName(v.userName) === normalizeName(newVisit.userName) &&
                v.dayOfWeek === newVisit.dayOfWeek &&
                v.startTime === newVisit.startTime
              );

              if (!isDuplicate) {
                imported.push(newVisit);
              }
            }
          }
          
          // リストを完全に上書き
          setVisits(imported);
          setToastMessage(`スプレッドシートから ${imported.length}件のスケジュールを読み込み、更新しました`);
          setShowToast(true);
          setTimeout(() => setShowToast(false), 4000);
        } catch (error) {
          console.error("Sheet fetch error:", error);
          setToastMessage("読み込みに失敗しました。URLや公開設定（CSV形式）を確認してください。");
          setShowToast(true);
          setTimeout(() => setShowToast(false), 4000);
        } finally {
          setIsLoadingSheet(false);
        }
      };

      // --- Googleスプレッドシートから看護師インポート (完全上書き仕様) ---
      const handleFetchNurseSheet = async () => {
        if (!nurseSheetUrl) {
          setToastMessage("スプレッドシートのURLを入力してください");
          setShowToast(true);
          setTimeout(() => setShowToast(false), 3000);
          return;
        }

        setIsLoadingNurseSheet(true);
        try {
          const response = await fetch(nurseSheetUrl);
          if (!response.ok) throw new Error('ネットワークエラー');
          const text = await response.text();
          const lines = text.split(/\r\n|\n/);
          if (lines.length < 2) throw new Error('データがありません');

          const imported = [];
          const dayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };

          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split(',');
            
            if (parts.length > 0 && parts[0].trim()) {
              const name = parts[0].trim();
              
              let startTime = parts.length > 1 && parts[1].trim() ? parts[1].trim() : '08:30';
              if (startTime.length === 4) startTime = '0' + startTime;
              
              // 休みの曜日を抽出 (例: "日・土", "水" など)
              let offDays = [];
              if (parts.length > 2 && parts[2].trim()) {
                const offDaysStr = parts[2].trim();
                for (let d of Object.keys(dayMap)) {
                  if (offDaysStr.includes(d)) {
                    offDays.push(dayMap[d]);
                  }
                }
              }

              // 優先度低フラグを抽出 (例: "低", "下")
              let isLowPriority = false;
              if (parts.length > 3 && parts[3].trim()) {
                const p = parts[3].trim();
                if (p === '低' || p === '下' || p === '優先順位低' || p === '優先度低') {
                  isLowPriority = true;
                }
              }

              const newNurse = {
                id: Date.now() + i,
                name: name,
                startLocation: { x: 50, y: 50 }, // ステーションの座標
                color: colors[imported.length % colors.length],
                startTime: startTime,
                offDays: offDays, // 休みの配列 [0, 6] など
                isLowPriority: isLowPriority
              };

              // ファイル内での重複はスキップ
              const isDuplicate = imported.some(n => normalizeName(n.name) === normalizeName(newNurse.name));
              if (!isDuplicate) {
                imported.push(newNurse);
              }
            }
          }

          // 既存の訪問スケジュールの「担当看護師」の整合性をとる
          setVisits(prevVisits => prevVisits.map(v => {
            if (v.nurseId === null) return v;
            const oldNurse = nurses.find(n => n.id === v.nurseId);
            if (!oldNurse) return { ...v, nurseId: null };
            const newNurse = imported.find(n => normalizeName(n.name) === normalizeName(oldNurse.name));
            // もし新しい看護師がその曜日に休みなら未割り当てに戻す
            if (newNurse && (newNurse.offDays || []).includes(v.dayOfWeek)) {
              return { ...v, nurseId: null };
            }
            return { ...v, nurseId: newNurse ? newNurse.id : null };
          }));

          // リストを完全に上書き
          setNurses(imported);
          if (imported.length > 0) {
            setSelectedNurseId(imported[0].id);
          } else {
            setSelectedNurseId(null);
          }
          
          setToastMessage(`スプレッドシートから ${imported.length}名の看護師リストを読み込み、更新しました`);
          setShowToast(true);
          setTimeout(() => setShowToast(false), 4000);
        } catch (error) {
          console.error("Sheet fetch error:", error);
          setToastMessage("読み込みに失敗しました。URLや公開設定を確認してください。");
          setShowToast(true);
          setTimeout(() => setShowToast(false), 4000);
        } finally {
          setIsLoadingNurseSheet(false);
        }
      };

      const unassignedCount = visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).length;

      return (
        <div className="flex h-screen bg-slate-50 text-slate-800 font-sans">
          <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex shrink-0">
            <div className="p-6">
              <div className="flex items-center gap-2 text-white font-bold text-xl mb-1">
                <Activity className="text-teal-400" />
                <span>CareRoute</span>
              </div>
              <p className="text-xs text-slate-500">定期訪問スケジュール最適化</p>
            </div>
            <nav className="flex-1 px-4 space-y-2">
              <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'overview' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Columns size={20} /> 全体スケジュール
              </button>
              <button onClick={() => setActiveTab('schedule')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'schedule' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Calendar size={20} /> 個別・ルート確認
              </button>
              <button onClick={() => setActiveTab('visits')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'visits' ? 'bg-teal-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Users size={20} /> 利用者管理
              </button>

                              </React.Fragment>
                            ))}
                            
                            {visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId === null).map(visit => (
                              <g key={`unassigned-${visit.id}`}>
                                <circle cx={visit.location.x} cy={visit.location.y} r="2.5" fill="#cbd5e1" className="animate-pulse"/>
                                <text x={visit.location.x} y={visit.location.y - 4} fontSize="3" textAnchor="middle" fill="#64748b">{visit.userName}</text>
                                <text x={visit.location.x} y={visit.location.y + 4} fontSize="2.5" textAnchor="middle" fill="#94a3b8">{visit.startTime}</text>
                              </g>
                            ))}

                            {visits.filter(v => v.dayOfWeek === selectedDay && v.nurseId !== null && v.nurseId !== selectedNurseId).map(visit => (
                              <circle key={`other-${visit.id}`} cx={visit.location.x} cy={visit.location.y} r="1.5" fill="#e2e8f0" />
                            ))}

                            {!isSelectedNurseOff && selectedNurse && schedule.map((visit, i) => {
                              const prev = i === 0 ? selectedNurse.startLocation : schedule[i-1].location;
                              return (
                                <line key={`line-${visit.id}`} x1={prev.x} y1={prev.y} x2={visit.location.x} y2={visit.location.y}
                                  stroke={visit.isLate ? '#ef4444' : selectedNurse.color} strokeWidth="1.2" strokeDasharray="2 2" className="animate-pulse" />
                              );
                            })}
                            {!isSelectedNurseOff && selectedNurse && schedule.length > 0 && (
                              <line x1={schedule[schedule.length-1].location.x} y1={schedule[schedule.length-1].location.y}
                                x2={selectedNurse.startLocation.x} y2={selectedNurse.startLocation.y} stroke={selectedNurse.color} strokeWidth="0.8" strokeDasharray="1 2" opacity="0.5" />
                            )}
                            
                            {!isSelectedNurseOff && selectedNurse && (
                              <>
                                <rect x={selectedNurse.startLocation.x - 3} y={selectedNurse.startLocation.y - 3} width="6" height="6" fill={selectedNurse.color} rx="1" />
                                <text x={selectedNurse.startLocation.x} y={selectedNurse.startLocation.y - 5} fontSize="3.5" fontWeight="bold" textAnchor="middle" fill="#334155">ステーション</text>
                              </>
                            )}

                            {!isSelectedNurseOff && selectedNurse && schedule.map((visit, i) => (
                              <g key={`point-${visit.id}`} className="transition-transform hover:scale-110 cursor-pointer">
                                <circle cx={visit.location.x} cy={visit.location.y} r="3.5" fill={visit.isLate ? '#fee2e2' : '#fff'} stroke={visit.isLate ? '#ef4444' : selectedNurse.color} strokeWidth="1.5" />
                                <text x={visit.location.x} y={visit.location.y - 5} fontSize="3.5" fontWeight="bold" textAnchor="middle" fill="#334155">{visit.userName}</text>
                                <text x={visit.location.x} y={visit.location.y + 1.2} fontSize="2.8" fontWeight="bold" textAnchor="middle" fill={visit.isLate ? '#ef4444' : selectedNurse.color}>{i + 1}</text>
                              </g>
                            ))}
                          </svg>
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- タブ: 利用者スケジュール管理 --- */}
              {activeTab === 'visits' && (
                <div className="max-w-6xl mx-auto space-y-6">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h1 className="text-2xl font-bold text-slate-800">利用者スケジュールの管理</h1>
                  </div>

                  {/* インポートセクション */}
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800">
                        <RefreshCw size={20} className="text-blue-600"/>
                        スプレッドシートからスケジュールを同期
                      </h2>
                      <button 
                        onClick={handleFetchSheet} 
                        disabled={isLoadingSheet || !sheetUrl}
                        className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors disabled:opacity-50 shadow-sm"
                      >
                        <RefreshCw size={16} className={isLoadingSheet ? "animate-spin" : ""} />
                        最新データを再読み込み
                      </button>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                      <label className="block text-sm font-medium text-slate-700 mb-2 flex items-center gap-2">
                        <LinkIcon size={16} className="text-slate-500"/>
                        「ウェブに公開」したCSVのURL (自動保存されます)
                      </label>
                      <input 
                        type="text" 
                        placeholder="URLを貼り付け" 
                        value={sheetUrl}
                        onChange={handleSheetUrlChange}
                        className="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                      />
                      <p className="text-xs text-red-500 mt-3 font-medium">
                        ※「再読み込み」を行うと、現在アプリ内に表示されている利用者スケジュールはスプレッドシートの内容で【完全に上書き】されます。
                      </p>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-2 text-sm font-bold text-slate-700">
                       {DAYS[selectedDay]}曜日の登録リスト
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-white text-slate-500 text-sm border-b border-slate-200">
                            <th className="p-4 font-medium">指定時間</th>
                            <th className="p-4 font-medium">利用者名</th>
                            <th className="p-4 font-medium">所要時間</th>
                            <th className="p-4 font-medium">担当看護師</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {visits.filter(v => v.dayOfWeek === selectedDay).sort((a,b) => parseTime(a.startTime) - parseTime(b.startTime)).map(v => (
                            <tr key={v.id} className="hover:bg-slate-50 transition-colors">
                              <td className="p-4 font-bold text-slate-700">
                                {v.startTime}
                                {v.originalStartTime && v.originalStartTime !== v.startTime && (
                                  <div className="text-xs text-orange-600">(元: {v.originalStartTime})</div>
                                )}
                              </td>
                              <td className="p-4 font-medium text-slate-800">{v.userName}</td>
                              <td className="p-4 text-slate-600">{v.duration} 分</td>
                              <td className="p-4">
                                <select
                                  value={v.nurseId || 'unassigned'}
                                  onChange={(e) => updateVisitNurse(v.id, e.target.value)}
                                  className={`border rounded-md p-1.5 text-sm outline-none ${v.nurseId ? 'border-slate-300 bg-white' : 'border-amber-300 bg-amber-50 text-amber-800 font-medium'}`}
                                >
                                  <option value="unassigned">未割り当て</option>
                                  {nurses.map(n => <option key={n.id} value={n.id}>{n.name}</option>)}
                                </select>
                              </td>
                            </tr>
                          ))}
                          {visits.filter(v => v.dayOfWeek === selectedDay).length === 0 && (
                            <tr><td colSpan="4" className="p-8 text-center text-slate-500">スプレッドシートから名簿を読み込んでください。</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* --- タブ: 看護師管理 --- */}
              {activeTab === 'nurses' && (
                 <div className="max-w-6xl mx-auto space-y-6">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h1 className="text-2xl font-bold text-slate-800">看護師の管理</h1>
                  </div>

                  {/* インポートセクション */}
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800">
                        <RefreshCw size={20} className="text-blue-600"/>
                        スプレッドシートから名簿を同期
                      </h2>
                      <button 
                        onClick={handleFetchNurseSheet} 
                        disabled={isLoadingNurseSheet || !nurseSheetUrl}
                        className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors disabled:opacity-50 shadow-sm"
                      >
                        <RefreshCw size={16} className={isLoadingNurseSheet ? "animate-spin" : ""} />
                        最新データを再読み込み
                      </button>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                      <label className="block text-sm font-medium text-slate-700 mb-2 flex items-center gap-2">
                        <LinkIcon size={16} className="text-slate-500"/>
                        「ウェブに公開」したCSVのURL (自動保存されます)
                      </label>
                      <input 
                        type="text" 
                        placeholder="URLを貼り付け" 
                        value={nurseSheetUrl}
                        onChange={handleNurseSheetUrlChange}
                        className="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                      />
                      <p className="text-xs text-red-500 mt-3 font-medium">
                        ※「再読み込み」を行うと、現在アプリ内に表示されている看護師リストはスプレッドシートの内容で【完全に上書き】されます。
                      </p>
                      <p className="text-xs text-slate-500 mt-1">
                        スプレッドシートの入力ルール（列の順番）: 氏名, 勤務開始時間, 休みの曜日 (例: 日・土), <span className="font-bold text-slate-700">優先度 (例: 低)</span>
                      </p>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-2 text-sm font-bold text-slate-700">
                       現在の担当看護師リスト
                    </div>
                     <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-white text-slate-500 text-sm border-b border-slate-200">
                            <th className="p-4 font-medium">カラー</th>
                            <th className="p-4 font-medium">氏名</th>
                            <th className="p-4 font-medium">勤務開始時間</th>
                            <th className="p-4 font-medium">休みの曜日</th>
                            <th className="p-4 font-medium">優先度</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {nurses.map(nurse => (
                            <tr key={nurse.id} className="hover:bg-slate-50 transition-colors">
                              <td className="p-4">
                                <div className="w-6 h-6 rounded-full shadow-sm" style={{ backgroundColor: nurse.color }}></div>
                              </td>
                              <td className="p-4 font-bold text-slate-700">{nurse.name}</td>
                              <td className="p-4 text-slate-600">{nurse.startTime}</td>
                              <td className="p-4 text-slate-600">
                                {nurse.offDays && nurse.offDays.length > 0 ? nurse.offDays.map(d => DAYS[d]).join('・') : 'なし'}
                              </td>
                              <td className="p-4 text-slate-600">
                                {nurse.isLowPriority ? <span className="bg-slate-100 text-slate-500 px-2 py-1 rounded text-xs font-bold">低</span> : '通常'}
                              </td>
                            </tr>
                          ))}
                          {nurses.length === 0 && (
                            <tr><td colSpan="5" className="p-8 text-center text-slate-500">スプレッドシートから名簿を読み込んでください。</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                 </div>
              )}
            </div>
          </main>

          {showToast && (
            <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-bounce z-50 border border-slate-700">
              <CheckCircle2 size={20} className="text-emerald-400" />
              <span className="font-medium">{toastMessage}</span>
            </div>
          )}
        </div>
      );
    }

    // Reactを起動して画面に表示する
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
